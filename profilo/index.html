<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Il tuo profilo · Grand Line Chronicles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Marcellus+SC&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>window.GLC={saveKey:["glc_pirata_v4","glc_nave_v1","glc_profile_v1"],gate:true};</script>
<script src="/glc-auth.js"></script>
<style>
:root{
  --abyss:#0a1920; --abyss-2:#0e2530; --vellum:#ecdcb6; --vellum-2:#e3d0a4;
  --ink:#34271a; --ink-soft:#5e4c34; --gold:#c9a24a; --gold-bright:#ecca77;
  --seal:#9a241a; --foam:#a8c6bd; --line:#cdb487;
}
*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh; color:var(--vellum);
  font-family:'Cormorant Garamond',Georgia,serif; font-size:19px; line-height:1.5;
  background:
    radial-gradient(120% 80% at 50% -10%, #15333f 0%, #0a1920 55%, #060f14 100%) fixed;
}
a{color:inherit;}
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:14px clamp(16px,4vw,40px); border-bottom:1px solid rgba(201,162,74,.22);
}
.brand{display:flex; align-items:center; gap:9px; text-decoration:none;}
.brand .anc{color:var(--gold); font-size:20px;}
.brand .nm{font-family:'Marcellus SC',serif; letter-spacing:.16em; text-transform:uppercase; font-size:12px; color:var(--foam);}
.wrap{max-width:1000px; margin:0 auto; padding:clamp(22px,5vw,48px) clamp(16px,4vw,40px) 60px;}
.hero{text-align:center; margin-bottom:30px;}
.hero .compass{width:54px; height:54px; color:var(--gold); opacity:.9;}
.hero .kick{font-family:'Marcellus SC',serif; letter-spacing:.28em; text-transform:uppercase; font-size:12px; color:var(--gold); margin-top:6px;}
.hero h1{font-family:'Cinzel Decorative',serif; font-weight:900; font-size:clamp(30px,6vw,52px); color:var(--vellum); margin:.1em 0 0; text-shadow:0 2px 18px rgba(0,0,0,.4);}
.hero p{color:var(--foam); margin:.4em auto 0; max-width:540px;}

.panel{
  background:linear-gradient(168deg, rgba(236,220,182,.97), rgba(227,208,164,.97));
  color:var(--ink); border:1px solid var(--line); border-radius:8px;
  box-shadow:0 16px 40px rgba(0,0,0,.4); padding:22px 24px; margin-bottom:28px;
}
.panel .ttl{font-family:'Marcellus SC',serif; letter-spacing:.12em; text-transform:uppercase; font-size:12px; color:var(--ink-soft);}
.uname{display:flex; gap:12px; align-items:center; margin-top:10px; flex-wrap:wrap;}
.uname input{
  flex:1; min-width:200px; font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:var(--ink);
  background:#fffaf0; border:1px solid #b9a06f; border-radius:5px; padding:11px 14px;
}
.uname input:focus{outline:2px solid var(--gold); outline-offset:1px;}
.uname .hint{font-size:.95rem; color:var(--ink-soft);}

.phead{display:flex; gap:22px; align-items:center; flex-wrap:wrap;}
.avatar-wrap{position:relative; flex:none;}
.avatar{width:120px; height:120px; border-radius:50%; overflow:hidden; cursor:pointer; background:radial-gradient(circle at 50% 35%, #fff8ec, #efdcb4); border:3px solid var(--gold); box-shadow:0 8px 22px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; color:var(--seal); font-family:'Cinzel Decorative',serif; font-size:2.4rem;}
.avatar img{width:100%; height:100%; object-fit:cover; display:block;}
.avatar .ph-ico{width:48%; height:48%; color:#b9a06f;}
.avatar-cam{position:absolute; right:0; bottom:4px; width:36px; height:36px; border-radius:50%; border:2px solid var(--vellum); background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#23170a; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 3px 10px rgba(0,0,0,.4); padding:0;}
.avatar-cam svg{width:18px; height:18px;}
.avatar-cam:hover{filter:brightness(1.07);}
.phead-main{flex:1; min-width:210px;}
.phead-main .kick{font-family:'Marcellus SC',serif; letter-spacing:.26em; text-transform:uppercase; font-size:11px; color:var(--gold);}
.pname-row{display:flex; align-items:center; gap:10px; margin:5px 0 4px;}
.pname{font-family:'Cinzel Decorative',serif; font-weight:700; font-size:clamp(1.6rem,4.5vw,2.3rem); color:#2a1f12; line-height:1.12; word-break:break-word; cursor:text;}
.pname.empty{color:#9a8a6e; font-style:italic; font-weight:400;}
.pname-edit{flex:none; width:30px; height:30px; border-radius:50%; border:1px solid var(--line); background:#fffaf0; color:var(--seal); cursor:pointer; font-size:13px; line-height:1; display:flex; align-items:center; justify-content:center;}
.pname-edit:hover{border-color:var(--gold); background:#fff;}
.pname-input{width:100%; max-width:380px; font-family:'Cinzel Decorative',serif; font-weight:700; font-size:clamp(1.4rem,4vw,2rem); color:#2a1f12; background:#fffaf0; border:1px solid #b9a06f; border-radius:6px; padding:6px 12px; margin:2px 0 4px;}
.pname-input:focus{outline:2px solid var(--gold); outline-offset:1px;}
.pstats{font-size:1.02rem; color:var(--ink-soft);}
.empty-note{grid-column:1/-1; text-align:center; color:var(--foam); font-style:italic; padding:4px 0 2px;}
.sec-head{display:flex; align-items:center; justify-content:space-between; gap:12px; margin:6px 2px 14px; flex-wrap:wrap;}
.sec-head h2{font-family:'Cinzel Decorative',serif; font-weight:700; font-size:clamp(20px,4vw,28px); color:var(--vellum); margin:0;}
.btn-gold{
  font-family:'Marcellus SC',serif; letter-spacing:.12em; text-transform:uppercase; font-size:12px;
  color:#23170a; background:linear-gradient(180deg,var(--gold-bright),var(--gold)); border:none;
  border-radius:999px; padding:11px 20px; cursor:pointer; transition:transform .15s;
}
.btn-gold:hover{transform:translateY(-1px);}

.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px;}
.ch-card{
  display:flex; gap:14px; align-items:flex-start;
  background:linear-gradient(168deg, rgba(236,220,182,.97), rgba(227,208,164,.97));
  color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:16px; box-shadow:0 10px 26px rgba(0,0,0,.35);
}
.ch-av{
  width:62px; height:62px; flex:none; border-radius:6px; overflow:hidden;
  display:flex; align-items:center; justify-content:center; font-size:30px; color:var(--seal);
  background:#fffaf0; border:1px solid #cdb487;
}
.ch-av img{width:100%; height:100%; object-fit:cover; display:block;}
.ch-body{flex:1; min-width:0;}
.ch-name{font-family:'Cinzel Decorative',serif; font-weight:700; font-size:1.2rem; color:#2a1f12; line-height:1.15; word-break:break-word;}
.ch-sub{font-size:.98rem; color:var(--ink-soft); margin-top:3px; min-height:1.2em;}
.ch-acts{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}
.ch-btn{font-family:'Marcellus SC',serif; letter-spacing:.06em; text-transform:uppercase; font-size:11px; border-radius:5px; padding:8px 13px; cursor:pointer; border:1px solid;}
.ch-btn.open{color:#23170a; background:linear-gradient(180deg,var(--gold-bright),var(--gold)); border-color:var(--gold);}
.ch-btn.open:hover{filter:brightness(1.05);}
.ch-btn.del{color:var(--seal); background:transparent; border-color:rgba(154,36,26,.5);}
.ch-btn.del:hover{background:rgba(154,36,26,.08);}
.ch-new{
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  min-height:118px; border:1.5px dashed rgba(201,162,74,.5); border-radius:8px;
  background:rgba(236,220,182,.06); color:var(--foam); cursor:pointer;
  font-family:'Marcellus SC',serif; letter-spacing:.1em; text-transform:uppercase; font-size:12px; transition:.15s;
}
.ch-new:hover{border-color:var(--gold); color:var(--gold-bright); background:rgba(201,162,74,.08);}
.ch-new .plus{font-size:30px; line-height:1; color:var(--gold);}
.foot{text-align:center; margin-top:34px;}
.foot a{font-family:'Marcellus SC',serif; letter-spacing:.1em; text-transform:uppercase; font-size:12px; color:var(--foam); text-decoration:none; border-bottom:1px solid transparent;}
.foot a:hover{border-bottom-color:var(--gold);}
@media(max-width:560px){ body{font-size:18px;} .ch-card{flex-direction:row;} }
</style>
</head>
<body>
  <div class="topbar">
    <a class="brand" href="/"><span class="anc">⚓</span><span class="nm">Grand Line Chronicles</span></a>
    <span id="glc-login-slot"></span>
  </div>

  <div class="wrap">
    <div class="panel phead">
      <div class="avatar-wrap">
        <div class="avatar" id="avatar" title="Cambia immagine"></div>
        <button class="avatar-cam" id="avatar-cam" type="button" title="Cambia immagine" aria-label="Cambia immagine">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13" r="3.5"/></svg>
        </button>
        <input id="avatar-file" type="file" accept="image/*" style="display:none">
      </div>
      <div class="phead-main">
        <div class="kick">Il tuo profilo</div>
        <div class="pname-row">
          <span class="pname" id="pname">—</span>
          <button class="pname-edit" id="pname-edit" type="button" title="Modifica nome" aria-label="Modifica nome">✎</button>
        </div>
        <input id="username-in" class="pname-input" type="text" placeholder="Il tuo nome di capitano" maxlength="40" autocomplete="off" style="display:none">
        <div class="pstats" id="pstats">—</div>
      </div>
    </div>

    <div class="sec-head">
      <h2>Il tuo equipaggio</h2>
      <button class="btn-gold" id="new-btn" type="button">+ Nuovo personaggio</button>
    </div>
    <div class="grid" id="chars"></div>

    <div class="sec-head" style="margin-top:34px">
      <h2>Le tue navi</h2>
      <button class="btn-gold" id="new-ship" type="button">+ Nuova nave</button>
    </div>
    <div class="grid" id="ships"></div>

    <div class="foot"><a href="/">◀ Torna al porto</a></div>
  </div>

<script>
(function(){
  "use strict";
  var KEY="glc_pirata_v4", PKEY="glc_profile_v1";
  var RACE_NAMES={umano:"Umano",uomopesce:"Uomo Pesce / Tritone",gigante:"Gigante",mink:"Mink",lunarian:"Lunarian",longbraccio:"Longbraccio",lungagamba:"Lungagamba",cyborg:"Cyborg"};
  var BLV=[[0,"Sconosciuto"],[10000000,"Pirata Emergente"],[80000000,"Pericoloso"],[200000000,"Famigerato"],[500000000,"Temibile"],[1000000000,"Leggendario"]];

  function newId(){return "c_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function label(c){return (c&&c.nome&&c.nome.trim())?c.nome.trim():"Senza nome";}
  function bountyLabel(n){var lv=BLV[0][1];for(var i=0;i<BLV.length;i++){if(n>=BLV[i][0])lv=BLV[i][1];}return lv;}
  function subtitle(c){var b=[];if(c.race&&RACE_NAMES[c.race])b.push(RACE_NAMES[c.race]);if(c.role)b.push(c.role);var n=Number(c.bounty||0);if(n>0)b.push(bountyLabel(n));return b.join("  ·  ")||"Scheda da completare";}

  function readCT(){
    var o=null; try{o=JSON.parse(localStorage.getItem(KEY)||"null");}catch(e){}
    if(o && o.chars && typeof o.chars==="object"){
      o.order=Array.isArray(o.order)?o.order.filter(function(id){return o.chars[id];}):[];
      for(var id in o.chars){ if(o.order.indexOf(id)<0) o.order.push(id); }
      if(!o.chars[o.activeId]) o.activeId=o.order[0]||"";
      return o;
    }
    if(o){ var nid=newId(); var ch={}; ch[nid]=o; return {v:2,activeId:nid,order:[nid],chars:ch}; }
    return {v:2,activeId:"",order:[],chars:{}};
  }
  function writeCT(ct){ try{localStorage.setItem(KEY,JSON.stringify(ct));}catch(e){} }
  function readProfile(){ try{return JSON.parse(localStorage.getItem(PKEY)||"{}")||{};}catch(e){return {};} }
  function writeProfile(p){ try{localStorage.setItem(PKEY,JSON.stringify(p));}catch(e){} }
  var NKEY="glc_nave_v1";
  function newNId(){return "n_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
  function shipLabel(s){return (s&&s.nome&&s.nome.trim())?s.nome.trim():"Nave senza nome";}
  function shipSub(s){var b=[];if(s.tipo)b.push(s.tipo);if(s.legno)b.push(s.legno);return b.join("  ·  ")||"Nave da completare";}
  function readNT(){var o=null;try{o=JSON.parse(localStorage.getItem(NKEY)||"null");}catch(e){}
    if(o&&o.ships&&typeof o.ships==="object"){o.order=Array.isArray(o.order)?o.order.filter(function(id){return o.ships[id];}):[];for(var id in o.ships)if(o.order.indexOf(id)<0)o.order.push(id);if(!o.ships[o.activeId])o.activeId=o.order[0]||"";return o;}
    if(o){var nid=newNId();var sh={};sh[nid]=o;return {v:1,activeId:nid,order:[nid],ships:sh};}
    return {v:1,activeId:"",order:[],ships:{}};}
  function writeNT(nt){try{localStorage.setItem(NKEY,JSON.stringify(nt));}catch(e){}}
  function openShip(id){var nt=readNT();if(nt.ships[id]){nt.activeId=id;writeNT(nt);}location.href="/nave-portale/?n="+encodeURIComponent(id);}
  function newShip(){var nt=readNT();var id=newNId();nt.ships[id]={};nt.order.push(id);nt.activeId=id;writeNT(nt);location.href="/nave-portale/?n="+encodeURIComponent(id);}
  function delShip(id){var nt=readNT();if(!nt.ships[id])return;if(!confirm("Eliminare «"+shipLabel(nt.ships[id])+"» dalle tue navi? Non è reversibile."))return;delete nt.ships[id];nt.order=nt.order.filter(function(x){return x!==id;});if(nt.activeId===id)nt.activeId=nt.order[0]||"";writeNT(nt);renderShips();}

  function openChar(id){ var ct=readCT(); if(ct.chars[id]){ ct.activeId=id; writeCT(ct); } location.href="/gestisci-pirata/?c="+encodeURIComponent(id); }
  function newChar(){ location.href="/crea-il-tuo-pirata/"; }
  function delChar(id){ var ct=readCT(); if(!ct.chars[id])return; if(!confirm("Eliminare «"+label(ct.chars[id])+"» dall'equipaggio? Non è reversibile."))return; delete ct.chars[id]; ct.order=ct.order.filter(function(x){return x!==id;}); if(ct.activeId===id) ct.activeId=ct.order[0]||""; writeCT(ct); renderChars(); }

  function makeCard(id,c){
    var card=document.createElement("div"); card.className="ch-card";
    var av=document.createElement("div"); av.className="ch-av";
    if(c.photo){ var img=document.createElement("img"); img.src=c.photo; img.alt=""; av.appendChild(img); } else { av.textContent="⚓"; }
    card.appendChild(av);
    var body=document.createElement("div"); body.className="ch-body";
    var h=document.createElement("div"); h.className="ch-name"; h.textContent=label(c); body.appendChild(h);
    var sub=document.createElement("div"); sub.className="ch-sub"; sub.textContent=subtitle(c); body.appendChild(sub);
    var acts=document.createElement("div"); acts.className="ch-acts";
    var op=document.createElement("button"); op.className="ch-btn open"; op.type="button"; op.textContent="Apri scheda"; op.onclick=function(){openChar(id);};
    var dl=document.createElement("button"); dl.className="ch-btn del"; dl.type="button"; dl.textContent="Elimina"; dl.onclick=function(){delChar(id);};
    acts.appendChild(op); acts.appendChild(dl); body.appendChild(acts);
    card.appendChild(body); return card;
  }
  function makeNewCard(){
    var b=document.createElement("button"); b.className="ch-new"; b.type="button";
    b.innerHTML='<span class="plus">+</span><span>Nuovo personaggio</span>'; b.onclick=newChar; return b;
  }
  function makeShipCard(id,s){
    var card=document.createElement("div"); card.className="ch-card";
    var av=document.createElement("div"); av.className="ch-av"; av.textContent="⛵";
    card.appendChild(av);
    var body=document.createElement("div"); body.className="ch-body";
    var h=document.createElement("div"); h.className="ch-name"; h.textContent=shipLabel(s); body.appendChild(h);
    var sub=document.createElement("div"); sub.className="ch-sub"; sub.textContent=shipSub(s); body.appendChild(sub);
    var acts=document.createElement("div"); acts.className="ch-acts";
    var op=document.createElement("button"); op.className="ch-btn open"; op.type="button"; op.textContent="Apri"; op.onclick=function(){openShip(id);};
    var dl=document.createElement("button"); dl.className="ch-btn del"; dl.type="button"; dl.textContent="Elimina"; dl.onclick=function(){delShip(id);};
    acts.appendChild(op); acts.appendChild(dl); body.appendChild(acts);
    card.appendChild(body); return card;
  }
  function makeNewShipCard(){
    var b=document.createElement("button"); b.className="ch-new"; b.type="button";
    b.innerHTML='<span class="plus">+</span><span>Nuova nave</span>'; b.onclick=newShip; return b;
  }
  function renderShips(){
    var nt=readNT(); var grid=document.getElementById("ships"); if(!grid) return;
    grid.innerHTML="";
    if(!nt.order.length){ var en=document.createElement("div"); en.className="empty-note"; en.textContent="Non hai ancora navi. Creane una con il riquadro qui sotto."; grid.appendChild(en); }
    nt.order.forEach(function(id){ grid.appendChild(makeShipCard(id, nt.ships[id])); });
    grid.appendChild(makeNewShipCard());
  }
  function renderChars(){
    var ct=readCT(); var grid=document.getElementById("chars"); if(!grid) return;
    grid.innerHTML="";
    if(!ct.order.length){ var en=document.createElement("div"); en.className="empty-note"; en.textContent="Non hai ancora pirati. Creane uno con il riquadro qui sotto."; grid.appendChild(en); }
    ct.order.forEach(function(id){ grid.appendChild(makeCard(id, ct.chars[id])); });
    grid.appendChild(makeNewCard());
  }
  function renderAvatar(){
    var a=document.getElementById("avatar"); if(!a) return; var p=readProfile();
    if(p.avatar){ a.innerHTML='<img src="'+p.avatar+'" alt="">'; }
    else { var init=((p.username||"").trim().charAt(0)||"").toUpperCase();
      a.innerHTML = init ? '<span>'+esc(init)+'</span>' : '<svg class="ph-ico" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.4 0-9 2.2-9 6v2h18v-2c0-3.8-4.6-6-9-6Z"/></svg>'; }
  }
  function renderName(){
    var d=document.getElementById("pname"); if(!d) return; var u=(readProfile().username||"").trim();
    if(u){ d.textContent=u; d.classList.remove("empty"); } else { d.textContent="Aggiungi il tuo nome"; d.classList.add("empty"); }
  }
  function startEdit(){
    var d=document.getElementById("pname"), e=document.getElementById("pname-edit"), inp=document.getElementById("username-in");
    if(!inp) return; inp.value=(readProfile().username||"");
    if(d) d.style.display="none"; if(e) e.style.display="none"; inp.style.display="block"; inp.focus(); inp.select();
  }
  function endEdit(){
    var d=document.getElementById("pname"), e=document.getElementById("pname-edit"), inp=document.getElementById("username-in");
    if(!inp) return; var p=readProfile(); p.username=(inp.value||"").trim(); writeProfile(p);
    inp.style.display="none"; if(d) d.style.display=""; if(e) e.style.display=""; renderName(); renderAvatar();
  }
  function handleAvatar(file){
    if(!file||!file.type||file.type.indexOf("image/")!==0)return;
    var rd=new FileReader();
    rd.onload=function(){ var img=new Image(); img.onload=function(){
      var max=320,w=img.width,h=img.height,sc=Math.min(1,max/Math.max(w,h));
      var cw=Math.round(w*sc),ch=Math.round(h*sc); var cv=document.createElement("canvas"); cv.width=cw; cv.height=ch;
      cv.getContext("2d").drawImage(img,0,0,cw,ch);
      var p=readProfile(); try{p.avatar=cv.toDataURL("image/jpeg",0.85);}catch(e){p.avatar=rd.result;} writeProfile(p); renderAvatar();
    }; img.src=rd.result; };
    rd.readAsDataURL(file);
  }
  function renderAll(){
    renderAvatar(); renderName();
    var n=readCT().order.length;
    var ps=document.getElementById("pstats"); if(ps) ps.textContent = n===0 ? "La tua ciurma è ancora vuota" : (n+(n===1?" personaggio":" personaggi")+" nella tua ciurma");
    renderChars(); renderShips();
  }

  document.addEventListener("DOMContentLoaded", function(){
    var d=document.getElementById("pname"), e=document.getElementById("pname-edit"), inp=document.getElementById("username-in");
    if(d) d.addEventListener("click", startEdit);
    if(e) e.addEventListener("click", startEdit);
    if(inp){ inp.addEventListener("blur", endEdit); inp.addEventListener("keydown", function(ev){ if(ev.key==="Enter"){ ev.preventDefault(); inp.blur(); } }); }
    var nb=document.getElementById("new-btn"); if(nb) nb.onclick=newChar;
    var nsb=document.getElementById("new-ship"); if(nsb) nsb.onclick=newShip;
    var av=document.getElementById("avatar"), cam=document.getElementById("avatar-cam"), af=document.getElementById("avatar-file");
    function pickAvatar(){ if(af) af.click(); }
    if(av) av.addEventListener("click", pickAvatar);
    if(cam) cam.addEventListener("click", function(ev){ ev.stopPropagation(); pickAvatar(); });
    if(af) af.addEventListener("change", function(ev){ if(ev.target.files[0]) handleAvatar(ev.target.files[0]); });
    renderAll();
    if(window.__glcSB && window.__glcSB.auth && window.__glcSB.auth.onAuthStateChange){
      window.__glcSB.auth.onAuthStateChange(function(){ setTimeout(renderAll,300); });
    }
