<style>
:root{
  --abyss:#0a1920; --vellum:#ecdcb6; --vellum-2:#e3d0a4; --ink:#34271a; --ink-soft:#5e4c34;
  --gold:#c9a24a; --gold-bright:#ecca77; --seal:#9a241a; --foam:#a8c6bd; --line:#cdb487;
}
*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh; color:var(--vellum);

a{color:inherit;}
.topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px clamp(16px,4vw,40px); border-bottom:1px solid rgba(201,162,74,.22);}
.brand{display:flex; align-items:center; gap:9px; text-decoration:none;}
.brand .anc{color:var(--gold); font-size:20px;}
.brand .nm{font-family:'Marcellus SC',serif; letter-spacing:.16em; text-transform:uppercase; font-size:12px; color:var(--foam);}
.wrap{max-width:780px; margin:0 auto; padding:clamp(20px,4vw,40px) clamp(16px,4vw,36px) 70px;}
.hero{text-align:center; margin-bottom:18px;}
.hero .kick{font-family:'Marcellus SC',serif; letter-spacing:.28em; text-transform:uppercase; font-size:11px; color:var(--gold);}
.hero h1{font-family:'Cinzel Decorative',serif; font-weight:900; font-size:clamp(26px,5.5vw,44px); color:var(--vellum); margin:.12em 0 0; text-shadow:0 2px 16px rgba(0,0,0,.4);}

.stepper{display:flex; flex-wrap:wrap; justify-content:center; gap:7px; margin:18px 0 22px;}
.stepper button{display:flex; align-items:center; gap:7px; font-family:'Marcellus SC',serif; font-size:11px; letter-spacing:.04em; color:var(--foam); background:rgba(236,220,182,.05); border:1px solid rgba(201,162,74,.3); border-radius:999px; padding:7px 12px; cursor:pointer; transition:.15s;}
.stepper button .n{display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:50%; background:rgba(201,162,74,.25); color:var(--vellum); font-size:11px;}
.stepper button:hover{border-color:var(--gold);}
.stepper button.active{background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#23170a; border-color:var(--gold);}
.stepper button.active .n{background:#23170a; color:var(--gold-bright);}
.stepper button.done .n{background:var(--gold); color:#23170a;}

.panel{background:linear-gradient(168deg, rgba(236,220,182,.98), rgba(227,208,164,.98)); color:var(--ink); border:1px solid var(--line); border-radius:9px; box-shadow:0 16px 44px rgba(0,0,0,.45); padding:clamp(20px,4vw,30px);}
.kicker{font-family:'Marcellus SC',serif; font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--gold);}
.panel h2{font-family:'Cinzel Decorative',serif; font-weight:700; font-size:clamp(22px,4vw,30px); color:#2a1f12; margin:.15em 0 .1em;}
.explain{background:rgba(154,36,26,.06); border-left:4px solid var(--gold); border-radius:4px; padding:12px 16px; margin:14px 0 18px; color:var(--ink-soft); font-size:1.02rem;}
.explain b{color:var(--ink);}
label.fld{display:block; font-family:'Marcellus SC',serif; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); margin:14px 0 5px;}
input[type=text], textarea, select{width:100%; font-family:'Cormorant Garamond',serif; font-size:1.1rem; color:var(--ink); background:#fffaf0; border:1px solid #b9a06f; border-radius:5px; padding:10px 13px;}
input[type=text]:focus, textarea:focus, select:focus{outline:2px solid var(--gold); outline-offset:1px;}
textarea{min-height:80px; resize:vertical;}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media(max-width:560px){ .row2{grid-template-columns:1fr;} }

.cards{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin-top:6px;}
.card{background:#fffaf0; border:1px solid var(--line); border-radius:6px; padding:12px 13px; cursor:pointer; transition:.12s;}
.card:hover{border-color:var(--gold);}
.card.sel{border-color:var(--seal); box-shadow:inset 0 0 0 1.5px var(--seal); background:#fff;}
.card .t{font-family:'Cinzel Decorative',serif; font-weight:700; font-size:1.02rem; color:#2a1f12;}
.card .d{font-size:.92rem; color:var(--ink-soft); margin-top:3px;}
.infobox{background:rgba(201,162,74,.12); border:1px solid rgba(201,162,74,.4); border-radius:5px; padding:11px 14px; margin-top:14px; font-size:1rem; color:var(--ink);}
.infobox.red{background:rgba(154,36,26,.08); border-color:rgba(154,36,26,.35);}

.attrgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px;}
.attrrow{display:flex; align-items:center; justify-content:space-between; background:#fffaf0; border:1px solid var(--line); border-radius:6px; padding:11px 14px;}
.attrrow.locked{background:#f3e7cc;}
.attrrow .name{font-weight:600;} .attrrow .sd{font-size:.82rem; color:var(--ink-soft);}
.attrrow .die{font-family:'Marcellus SC',serif; font-size:1.05rem; color:var(--seal);}

.counter{font-family:'Marcellus SC',serif; font-size:12px; letter-spacing:.06em; color:var(--ink-soft); margin:10px 0;}
.skillrow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px dashed rgba(154,36,26,.18);}
.skillrow.role{background:rgba(201,162,74,.12); border-radius:5px; padding:9px 12px; border-bottom:none;}
.skillrow .sn{font-weight:600;} .skillrow .sd{font-size:.85rem; color:var(--ink-soft);}
.pick{display:flex; gap:5px; flex:none;}
.pick button{font-family:'Marcellus SC',serif; font-size:11px; border:1px solid var(--line); background:#fffaf0; color:var(--ink-soft); padding:6px 11px; border-radius:5px; cursor:pointer;}
.pick button.on{background:var(--seal); color:#fff; border-color:var(--seal);}

.portrait{width:120px; height:120px; border-radius:8px; border:2px dashed #b9a06f; background:#fffaf0; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); cursor:pointer; overflow:hidden; font-size:.85rem; text-align:center; padding:6px;}
.portrait img{width:100%; height:100%; object-fit:cover;}

.sumgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px 18px; margin-top:14px;}
@media(max-width:560px){ .sumgrid{grid-template-columns:1fr;} }
.sumrow{display:flex; justify-content:space-between; gap:12px; padding:7px 0; border-bottom:1px dotted rgba(154,36,26,.2);}
.sumrow .k{font-family:'Marcellus SC',serif; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft);}
.sumrow .v{font-weight:600; text-align:right; color:#2a1f12;}

.nav{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:22px;}
.btn{font-family:'Marcellus SC',serif; letter-spacing:.1em; text-transform:uppercase; font-size:12px; border:none; border-radius:999px; padding:13px 26px; cursor:pointer; transition:transform .15s; text-decoration:none; display:inline-block;}
.btn:hover{transform:translateY(-1px);}
.btn.gold{color:#23170a; background:linear-gradient(180deg,var(--gold-bright),var(--gold));}
.btn.ghost{color:var(--vellum); background:transparent; border:1px solid rgba(201,162,74,.5);}
.btn.big{font-size:14px; padding:15px 34px;}
.btn:disabled{opacity:.4; cursor:default; transform:none;}

.done-card{text-align:center;}
.done-card .seal{font-size:46px; color:var(--gold);}
.done-card h2{margin-top:6px;}
.done-actions{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:20px;}
</style>
</head>

<script>
(function(){
"use strict";
var ATTRS=["Forza","Tecnica","Spirito","Astuzia"];
var DICE_LADDER="d4 › d6 › d8 › d10 › d12 › d20";
var RACES=[
 {id:"umano",name:"Umano",attr:"choice",die:"d8",pv:14,hp:"d6",tech:"Volontà Incrollabile",techDesc:"A ≤25% PV si aggiunge a qualsiasi tiro. Non costa ST.",sv:"Nessuno"},
 {id:"uomopesce",name:"Uomo Pesce / Tritone",attr:"Forza",die:"d8",pv:16,hp:"d8",tech:"Dominio degli Abissi",techDesc:"In acqua si aggiunge a ogni tiro fisico. Respiro subacqueo infinito.",sv:"+2 soglia fisica a terra arida"},
 {id:"gigante",name:"Gigante",attr:"Forza",die:"d10",pv:22,hp:"d10",tech:"Scala Colossale",techDesc:"Quando la stazza conta si aggiunge al tiro. Ogni colpo a segno: Dado Danno +1 gradino.",sv:"No navi/edifici standard"},
 {id:"mink",name:"Mink",attr:"Tecnica",die:"d8",pv:14,hp:"d6",tech:"Electro + Sulong",techDesc:"Electro: paralisi (1 ST). Sulong: attributi +1 dado per una scena, poi esaurimento.",sv:"Esaurimento post-Sulong"},
 {id:"lunarian",name:"Lunarian",attr:"Spirito",die:"d8",pv:16,hp:"d8",tech:"Fiamma Immortale",techDesc:"Fiamma ON: +1 dado resistenza. OFF: bonus evasione. Alternare 1×/turno gratis.",sv:"Taglia automatica 50M"},
 {id:"longbraccio",name:"Longbraccio",attr:"Tecnica",die:"d8",pv:12,hp:"d6",tech:"Portata Estesa",techDesc:"Mischia a distanza insolita. Chi ti attacca ravvicinato ha +2 soglia.",sv:"Nessuno"},
 {id:"lungagamba",name:"Lungagamba",attr:"Forza",die:"d8",pv:14,hp:"d6",tech:"Calcio Colossale",techDesc:"Bonus su calci e movimenti verticali. 1×/combat salti fuori portata senza tiro.",sv:"Nessuno"},
 {id:"cyborg",name:"Cyborg",attr:"Forza",die:"d8",pv:16,hp:"d8",tech:"Corpo Meccanico",techDesc:"Bonus a resistenza danni e potenziamenti meccanici (definiti dal Capitano).",sv:"Curabile solo da un meccanico"}
];
var ROLES=[
 {name:"Combattente",multi:true,styles:[["Striker",["Atletica","Acrobazia"]],["Swordsman","Atletica"],["Sniper","Osservazione"],["Special","any"]],desc:"Il muscolo della ciurma. Lo Stile decide come combatti."},
 {name:"Dottore",multi:true,styles:[["Infermeria","Medicina"],["Tossicologo","Medicina"],["Chimico","Medicina"]],desc:"Tiene in piedi la ciurma: cure, veleni o chimica."},
 {name:"Cuoco",multi:false,skill:"Cucina",desc:"Nutre e rinvigorisce l'equipaggio; piatti che ridanno energie."},
 {name:"Navigatore",multi:false,skill:"Navigazione",desc:"Trasforma il mare da nemico a strada."},
 {name:"Ingegnere",multi:true,styles:[["Carpentiere","Carpenteria"],["Meccanico","Meccanica"],["Inventore","Meccanica"]],desc:"Costruisce e ripara: la nave, le macchine, le invenzioni."},
 {name:"Archeologo",multi:false,skill:"Archeologia",desc:"La memoria della ciurma; legge Poneglyph e rovine."},
 {name:"Musicista",multi:false,skill:"Arte",desc:"Il moltiplicatore: ridà Stamina e spezza la paura."},
 {name:"Capitano",multi:false,skill:"Comunicazione",desc:"La sua forza è l'Ambizione, i Legami e il comando."}
];
var SKILLS={"Artigianato":"Oggetti e attrezzi","Medicina":"Ferite, veleni","Navigazione":"Rotte, traversate","Cucina":"Pasti, recupero","Furtività":"Non visti, scasso","Atletica":"Corsa, lotta","Archeologia":"Storia, Poneglyph","Acrobazia":"Equilibrio, evasione","Arte":"Musica, falsi","Osservazione":"Pericoli, indizi","Meccanica":"Macchinari, cannoni","Carpenteria":"La nave","Esplorazione":"Isole","Comunicazione":"Convincere, trattare","Natura":"Piante, clima","Sopravvivenza":"Cibo, riparo"};
var STEPS=["Concetto","Razza","Attributi","Ruolo","Skill","Tecniche","Frutto","Salva"];

function blank(){return {nome:"",bg:"",amb:"",race:null,umanoAttr:"Forza",d6attr:"",role:null,style:"",role2:null,style2:"",talents:[],
 attr:{Forza:"",Tecnica:"",Spirito:"",Astuzia:""},
 skills:{}, roleSkillChoice:"", roleSkillDie:"d8", pa:{}, paThresh:{d4:10,d6:25,d8:60,d10:150,d12:400},
 t1:{nome:"",desc:"",attr:"",die:"d4"}, t2:{nome:"",desc:"",attr:"",die:"d4"}, racialDie:"d6", extraTech:[],
 armi:[], haki:[], frutto:{has:false,nome:"",tipo:"",desc:""},
 photo:"", bounty:"0", pvMax:null,pvCur:null,stMax:6,stCur:6,legami:0,ore:16,note:""};}
var D=blank(); var step=0; var KEY="glc_pirata_v4";

var $=function(s){return document.querySelector(s);};
function el(t,p,kids){var e=document.createElement(t);if(p)for(var k in p){if(k==="class")e.className=p[k];else if(k==="html")e.innerHTML=p[k];else if(k==="text")e.textContent=p[k];else if(k.slice(0,2)==="on")e[k.toLowerCase()]=p[k];else e.setAttribute(k,p[k]);}if(kids!=null)(Array.isArray(kids)?kids:[kids]).forEach(function(c){if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});return e;}
function newId(){return "c_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function race(){for(var i=0;i<RACES.length;i++)if(RACES[i].id===D.race)return RACES[i];return null;}
function racialAttr(){var r=race();if(!r)return null;return r.attr==="choice"?D.umanoAttr:r.attr;}
function computeAttr(){var r=race();if(!r)return;var ra=racialAttr();ATTRS.forEach(function(a){if(a===ra)D.attr[a]=r.die;else if(a===D.d6attr)D.attr[a]="d6";else if(D.d6attr)D.attr[a]="d4";else D.attr[a]="";});}
function afterRaceChange(){var r=race();computeAttr();if(r&&D.pvMax==null){D.pvMax=r.pv;D.pvCur=r.pv;}}
function roleDef(){for(var i=0;i<ROLES.length;i++)if(ROLES[i].name===D.role)return ROLES[i];return null;}
function styleEntry(){var r=roleDef();if(!r||!r.multi)return null;for(var i=0;i<r.styles.length;i++)if(r.styles[i][0]===D.style)return r.styles[i];return r.styles[0]||null;}
function roleSkill(){var r=roleDef();if(!r)return null;if(!r.multi)return r.skill;var st=styleEntry();if(!st)return null;var sk=st[1];if(Array.isArray(sk))return (D.roleSkillChoice&&sk.indexOf(D.roleSkillChoice)>=0)?D.roleSkillChoice:sk[0];if(sk==="any")return (D.roleSkillChoice&&SKILLS[D.roleSkillChoice])?D.roleSkillChoice:"";return sk;}
function defaultRoleSkillChoice(){var st=styleEntry();if(!st)return "";var sk=st[1];if(Array.isArray(sk))return sk[0];return "";}

function readCT(){var o=null;try{o=JSON.parse(localStorage.getItem(KEY)||"null");}catch(e){}
 if(o&&o.chars&&typeof o.chars==="object"){o.order=Array.isArray(o.order)?o.order.filter(function(id){return o.chars[id];}):[];for(var id in o.chars)if(o.order.indexOf(id)<0)o.order.push(id);if(!o.chars[o.activeId])o.activeId=o.order[0]||"";return o;}
 if(o){var nid=newId();var ch={};ch[nid]=o;return {v:2,activeId:nid,order:[nid],chars:ch};}
 return {v:2,activeId:"",order:[],chars:{}};}
function writeCT(ct){try{localStorage.setItem(KEY,JSON.stringify(ct));}catch(e){alert("Spazio insufficiente per salvare (forse una foto troppo grande).");}}

function buildStepper(){var n=$("#stepper");n.innerHTML="";STEPS.forEach(function(name,i){n.appendChild(el("button",{onclick:function(){goto(i);},html:'<span class="n">'+(i+1)+'</span>'+name}));});}
function refreshStepper(){var ch=$("#stepper").children;for(var i=0;i<ch.length;i++){ch[i].classList.toggle("active",i===step);ch[i].classList.toggle("done",i<step);}}
function goto(i){step=Math.max(0,Math.min(STEPS.length-1,i));refreshStepper();RENDER[step]();$("#prev").disabled=step===0;$("#next").style.visibility=step===STEPS.length-1?"hidden":"visible";window.scrollTo({top:0,behavior:"smooth"});}

var RENDER=[rConcept,rRace,rAttr,rRole,rSkill,rTech,rFruit,rFinal];

function rConcept(){
  var p=$("#panel");p.innerHTML="";
  p.appendChild(el("div",{class:"kicker",text:"Passo 1 di 8"}));
  p.appendChild(el("h2",{text:"Chi è il tuo pirata?"}));
  p.appendChild(el("div",{class:"explain",html:"Costruiamo il pirata un pezzo alla volta: a ogni passo ti spiego cosa stai scegliendo. Si parte da chi è.<br><b>Nome</b> e <b>Background</b> sono narrativi. L'<b>Ambizione</b> è il sogno che lo spinge: non dà bonus automatici, ma guida la storia e le ricompense decise dal Capitano."}));
  p.appendChild(el("label",{class:"fld",text:"Nome"}));
  var nome=el("input",{type:"text",placeholder:"Es. Bram «Mano di Ferro»"});nome.value=D.nome;nome.oninput=function(){D.nome=nome.value;};p.appendChild(nome);
  p.appendChild(el("label",{class:"fld",text:"Background (chi era prima del mare?)"}));
  var bg=el("textarea",{});bg.value=D.bg;bg.oninput=function(){D.bg=bg.value;};p.appendChild(bg);
  p.appendChild(el("label",{class:"fld",text:"Ambizione (il suo sogno)"}));
  var amb=el("input",{type:"text",placeholder:"«Costruirò la nave più veloce del Grand Line»"});amb.value=D.amb;amb.oninput=function(){D.amb=amb.value;};p.appendChild(amb);
}

function rRace(){
  var p=$("#panel");p.innerHTML="";
  p.appendChild(el("div",{class:"kicker",text:"Passo 2 di 8"}));
  p.appendChild(el("h2",{text:"Razza"}));
  p.appendChild(el("div",{class:"explain",html:"La Razza dà un <b>bonus a un Attributo</b>, una <b>Tecnica razziale gratuita</b>, i <b>Punti Vita</b> di partenza e il <b>Dado Vita</b> (quanto recuperi riposando). Alcune razze hanno anche uno svantaggio: scegli con cura."}));
  var c=el("div",{class:"cards"});
  RACES.forEach(function(r){
    c.appendChild(el("div",{class:"card"+(D.race===r.id?" sel":""),onclick:function(){D.race=r.id;afterRaceChange();rRace();},
      html:'<div class="t">'+r.name+'</div><div class="d">'+(r.attr==="choice"?"Attr. a scelta":r.attr)+' '+r.die+' · PV '+r.pv+' · Vita '+r.hp+'</div>'}));
  });
  p.appendChild(c);
  var r=race();
  if(r){
    p.appendChild(el("div",{class:"infobox",html:'<b>'+r.tech+' (Tecnica razziale):</b> '+r.techDesc+'<br><b>Svantaggio:</b> '+r.sv}));
    if(r.attr==="choice"){
      p.appendChild(el("label",{class:"fld",text:"Attributo potenziato dalla razza"}));
      var sel=el("select",{},ATTRS.map(function(a){return el("option",{value:a,text:a});}));
      sel.value=D.umanoAttr;sel.onchange=function(){D.umanoAttr=sel.value;computeAttr();};
      p.appendChild(sel);
    }
  }
}

function rAttr(){
  var p=$("#panel");p.innerHTML="";
  p.appendChild(el("div",{class:"kicker",text:"Passo 3 di 8"}));
  p.appendChild(el("h2",{text:"Attributi"}));
  p.appendChild(el("div",{class:"explain",html:"Tutto si gioca con i <b>dadi a gradini</b>: "+DICE_LADDER+". Più alto è il dado, più sei bravo.<br>Hai 4 Attributi. La tua Razza assegna il suo dado a uno di essi. Degli altri tre scegli quale prende il <b>d6</b> (buono): gli ultimi due restano a <b>d4</b>."}));
  var r=race();
  if(!r){p.appendChild(el("div",{class:"infobox red",text:"Scegli prima una razza (Passo 2)."}));return;}
  var ra=racialAttr();
  var others=ATTRS.filter(function(a){return a!==ra;});
  if(others.indexOf(D.d6attr)<0)D.d6attr="";
  p.appendChild(el("div",{class:"infobox",html:'<b>'+ra+'</b> riceve <b>'+r.die+'</b> dalla razza.'}));
  p.appendChild(el("label",{class:"fld",text:"Attributo con il d6"}));
  var sel=el("select",{},[el("option",{value:"",text:"— scegli —"})].concat(others.map(function(a){return el("option",{value:a,text:a});})));
  sel.value=D.d6attr;sel.onchange=function(){D.d6attr=sel.value;computeAttr();rAttr();};
  p.appendChild(sel);
  var g=el("div",{class:"attrgrid"});
  ATTRS.forEach(function(a){
    g.appendChild(el("div",{class:"attrrow"+(a===ra?" locked":""),html:'<div class="name">'+a+(a===ra?' <span class="sd">(razza)</span>':'')+'</div><div class="die">'+(D.attr[a]||"—")+'</div>'}));
  });
  p.appendChild(g);
}

function rRole(){
  var p=$("#panel");p.innerHTML="";
  p.appendChild(el("div",{class:"kicker",text:"Passo 4 di 8"}));
  p.appendChild(el("h2",{text:"Ruolo"}));
  p.appendChild(el("div",{class:"explain",html:"Il Ruolo è il mestiere del pirata e gli dà una <b>Skill peculiare già a d8</b>. Alcuni Ruoli (Combattente, Dottore, Ingegnere) hanno più <b>Stili</b>: lo Stile definisce come combatti o lavori."}));
  var c=el("div",{class:"cards"});
  ROLES.forEach(function(r){
    var sk=r.multi?"Stili: "+r.styles.map(function(s){return s[0];}).join(", "):"Skill: "+r.skill+" (d8)";
    c.appendChild(el("div",{class:"card"+(D.role===r.name?" sel":""),onclick:function(){D.role=r.name;D.style=r.multi?r.styles[0][0]:"";D.roleSkillChoice=defaultRoleSkillChoice();rRole();},
      html:'<div class="t">'+r.name+'</div><div class="d">'+sk+'</div>'}));
  });
  p.appendChild(c);
  var rd=roleDef();
  if(rd){
    p.appendChild(el("div",{class:"infobox",html:'<b>'+rd.name+'</b> — '+rd.desc}));
    if(rd.multi){
      p.appendChild(el("label",{class:"fld",text:"Stile"}));
      var sel=el("select",{},rd.styles.map(function(s){var skl=(Array.isArray(s[1])||s[1]==="any")?"a scelta":s[1];return el("option",{value:s[0],text:s[0]+"  (Skill: "+skl+")"});}));
      sel.value=D.style;sel.onchange=function(){D.style=sel.value;D.roleSkillChoice=defaultRoleSkillChoice();rRole();};
      p.appendChild(sel);
      var se=styleEntry();var skl=se?se[1]:null;
      if(Array.isArray(skl)||skl==="any"){
        p.appendChild(el("label",{class:"fld",text:"Skill di Ruolo (a scelta)"}));
        var opts=Array.isArray(skl)?skl:Object.keys(SKILLS);
        var head=(skl==="any")?[el("option",{value:"",text:"— scegli una Skill —"})]:[];
        var ssel=el("select",{},head.concat(opts.map(function(sk){return el("option",{value:sk,text:sk});})));
        ssel.value=D.roleSkillChoice||"";ssel.onchange=function(){D.roleSkillChoice=ssel.value;rRole();};
        p.appendChild(ssel);
      }
    }
    var rsk=roleSkill();
    p.appendChild(el("div",{class:"infobox",html:rsk?('Skill del Ruolo: <b>'+rsk+'</b> a <b>d8</b> (già assegnata).'):'Scegli la <b>Skill di Ruolo</b> qui sopra: entrerà a <b>d8</b>.'}));
  }
}

function countDie(v){var n=0;for(var k in D.skills)if(D.skills[k]===v)n++;return n;}
function flashCounter(){var c=$("#skill-counter");if(!c)return;c.style.color="#b71c1c";setTimeout(function(){c.style.color="";},400);}
function setSkill(name,v){
  if(v==="0"){delete D.skills[name];}
  else{var others=0;for(var k in D.skills){if(k!==name&&D.skills[k]===v)others++;}if(others>=2){flashCounter();return;}D.skills[name]=v;}
  rSkill();
}
function rSkill(){
  var p=$("#panel");p.innerHTML="";
  p.appendChild(el("div",{class:"kicker",text:"Passo 5 di 8"}));
  p.appendChild(el("h2",{text:"Skill"}));
  p.appendChild(el("div",{class:"explain",html:"Le Skill sono ciò che sai fare. In gioco tiri <b>Attributo + Skill</b> contro una Soglia. La Skill del tuo Ruolo è già a d8.<br>Ora scegline altre: <b>2 a d6</b> e <b>2 a d4</b>."}));
  var rs=roleSkill();
  if(!D.role){p.appendChild(el("div",{class:"infobox red",text:"Scegli prima un ruolo (Passo 4)."}));return;}
  p.appendChild(el("div",{class:"counter",id:"skill-counter",html:'Selezionate — d6: <b>'+countDie("d6")+'/2</b> · d4: <b>'+countDie("d4")+'/2</b>'+((countDie("d6")===2&&countDie("d4")===2)?' ✅':'')}));
  if(rs)p.appendChild(el("div",{class:"skillrow role",html:'<div><span class="sn">'+rs+'</span> <span class="sd">— '+(SKILLS[rs]||"")+'</span></div><div class="pick"><button class="on" disabled>d8 · Ruolo</button></div>'}));
  else p.appendChild(el("div",{class:"infobox red",html:"Torna al <b>Ruolo</b> (Passo 4) e scegli la <b>Skill di Ruolo</b> dello Stile Special: poi entrerà a d8."}));
  Object.keys(SKILLS).forEach(function(name){
    if(name===rs)return;
    var cur=D.skills[name]||"";
    var row=el("div",{class:"skillrow",html:'<div><span class="sn">'+name+'</span> <span class="sd">— '+SKILLS[name]+'</span></div>'});
    var pick=el("div",{class:"pick"});
    ["0","d4","d6"].forEach(function(v){
      var b=el("button",{text:v==="0"?"—":v,onclick:function(){setSkill(name,v);}});
      if(cur===v||(v==="0"&&!cur))b.classList.add("on");
      pick.appendChild(b);
    });
    row.appendChild(pick);p.appendChild(row);
  });
}

function rTech(){
  var p=$("#panel");p.innerHTML="";
  p.appendChild(el("div",{class:"kicker",text:"Passo 6 di 8"}));
  p.appendChild(el("h2",{text:"Tecniche"}));
  p.appendChild(el("div",{class:"explain",html:"Le Tecniche sono le mosse speciali: tiri <b>Attributo + un Dado</b> (che è anche il Dado Danno) e aggiungi effetti, spendendo Stamina. La Tecnica razziale è già inclusa. Qui puoi creare fino a <b>2 tecniche tue</b>; altre, e il costruttore avanzato con tutti gli effetti, sono nella <b>Gestione</b>."}));
  var r=race();
  if(r)p.appendChild(el("div",{class:"infobox",html:'<b>Tecnica razziale:</b> '+r.tech+' (d6) — '+r.techDesc}));
  [["t1","Tecnica 1"],["t2","Tecnica 2 (opzionale)"]].forEach(function(pair){
    var key=pair[0],lab=pair[1];var T=D[key];
    p.appendChild(el("label",{class:"fld",text:lab+" — Nome"}));
    var nm=el("input",{type:"text",placeholder:key==="t1"?"Es. Tre Lame — Oni Giri":"(opzionale)"});nm.value=T.nome;nm.oninput=function(){T.nome=nm.value;};p.appendChild(nm);
    var grid=el("div",{class:"row2"});
    var left=el("div",{});left.appendChild(el("label",{class:"fld",text:"Descrizione"}));var ds=el("textarea",{});ds.value=T.desc;ds.oninput=function(){T.desc=ds.value;};left.appendChild(ds);
    var right=el("div",{});
    right.appendChild(el("label",{class:"fld",text:"Attributo"}));
    var as=el("select",{},[el("option",{value:"",text:"—"})].concat(ATTRS.map(function(a){return el("option",{value:a,text:a});})));as.value=T.attr;as.onchange=function(){T.attr=as.value;};right.appendChild(as);
    right.appendChild(el("label",{class:"fld",text:"Dado (= Dado Danno)"}));
    var dd=el("select",{},["d4","d6","d8","d10","d12"].map(function(x){return el("option",{value:x,text:x});}));dd.value=T.die||"d4";dd.onchange=function(){T.die=dd.value;};right.appendChild(dd);
    grid.appendChild(left);grid.appendChild(right);p.appendChild(grid);
  });
}

function rFruit(){
  var p=$("#panel");p.innerHTML="";
  p.appendChild(el("div",{class:"kicker",text:"Passo 7 di 8"}));
  p.appendChild(el("h2",{text:"Frutto del Diavolo"}));
  p.appendChild(el("div",{class:"explain",html:"Un Frutto del Diavolo è <b>opzionale</b> e lo decide il Capitano. Dà poteri unici in cambio di <b>tre debolezze</b>: il mare, l'agalmatolite (Pietra di Mare) e l'Haki. Se non ne hai uno, salta pure questo passo."}));
  var lab=el("label",{class:"fld",style:"display:flex;align-items:center;gap:9px;text-transform:none;letter-spacing:0;font-size:1.05rem;"});
  var cb=el("input",{type:"checkbox",style:"width:auto;"});cb.checked=D.frutto.has;
  cb.onchange=function(){D.frutto.has=cb.checked;rFruit();};
  lab.appendChild(cb);lab.appendChild(document.createTextNode("Il mio pirata ha un Frutto del Diavolo"));
  p.appendChild(lab);
  if(D.frutto.has){
    p.appendChild(el("label",{class:"fld",text:"Nome del Frutto"}));
    var nm=el("input",{type:"text",placeholder:"Es. Gomu Gomu no Mi"});nm.value=D.frutto.nome;nm.oninput=function(){D.frutto.nome=nm.value;};p.appendChild(nm);
    var grid=el("div",{class:"row2"});
    var left=el("div",{});left.appendChild(el("label",{class:"fld",text:"Descrizione / Potere"}));var ds=el("textarea",{});ds.value=D.frutto.desc;ds.oninput=function(){D.frutto.desc=ds.value;};left.appendChild(ds);
    var right=el("div",{});right.appendChild(el("label",{class:"fld",text:"Tipo"}));
    var ts=el("select",{},[el("option",{value:"",text:"—"}),el("option",{text:"Paramecia"}),el("option",{text:"Logia"}),el("option",{text:"Zoan"})]);ts.value=D.frutto.tipo;ts.onchange=function(){D.frutto.tipo=ts.value;};right.appendChild(ts);
    grid.appendChild(left);grid.appendChild(right);p.appendChild(grid);
    p.appendChild(el("div",{class:"infobox red",html:"<b>Tre debolezze:</b> il mare ti toglie le forze, la Pietra di Mare annulla i poteri, l'Haki ti colpisce comunque."}));
  }
}

function handleFile(file){
  if(!file||!file.type||file.type.indexOf("image/")!==0)return;
  var rd=new FileReader();
  rd.onload=function(){var img=new Image();img.onload=function(){
    var max=560,w=img.width,h=img.height,sc=Math.min(1,max/Math.max(w,h));
    var cw=Math.round(w*sc),ch=Math.round(h*sc);var cv=document.createElement("canvas");cv.width=cw;cv.height=ch;
    cv.getContext("2d").drawImage(img,0,0,cw,ch);
    try{D.photo=cv.toDataURL("image/jpeg",0.82);}catch(e){D.photo=rd.result;}
    rFinal();
  };img.src=rd.result;};
  rd.readAsDataURL(file);
}

function rFinal(){
  var p=$("#panel");p.className="panel";p.innerHTML="";
  p.appendChild(el("div",{class:"kicker",text:"Passo 8 di 8"}));
  p.appendChild(el("h2",{text:"Riepilogo & Salvataggio"}));
  p.appendChild(el("div",{class:"explain",html:"Ecco il tuo pirata. Le ultime statistiche si ricavano da sole: <b>PV</b> dalla Razza, <b>Stamina 6</b>, <b>nessun Haki</b> all'inizio (si sblocca crescendo), <b>Legami 0</b>, <b>Taglia 0</b>. Aggiungi una foto se vuoi, poi salvalo nella tua lista."}));

  var top=el("div",{style:"display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-top:6px;"});
  var port=el("div",{class:"portrait"});
  if(D.photo){port.appendChild(el("img",{src:D.photo,alt:""}));}else{port.textContent="Tocca per aggiungere una foto";}
  var file=el("input",{type:"file",accept:"image/*",style:"display:none;"});
  port.onclick=function(){file.click();};
  file.onchange=function(e){if(e.target.files[0])handleFile(e.target.files[0]);};
  top.appendChild(port);top.appendChild(file);
  var name=el("div",{});
  name.appendChild(el("div",{style:"font-family:'Cinzel Decorative',serif;font-weight:700;font-size:1.5rem;color:#2a1f12;",text:D.nome||"Pirata Senza Nome"}));
  name.appendChild(el("div",{style:"color:var(--ink-soft);",text:D.amb?("“"+D.amb+"”"):"—"}));
  top.appendChild(name);
  p.appendChild(top);

  var r=race();
  var attrStr=ATTRS.map(function(a){return a.slice(0,3)+" "+(D.attr[a]||"—");}).join(" · ");
  var skillStr=Object.keys(D.skills).map(function(k){return k+" "+D.skills[k];}).join(", ")||"—";
  var roleStr=D.role?(D.role+(D.style?(" · "+D.style):"")):"—";
  var techs=[];if(r)techs.push(r.tech+" (raz.)");if(D.t1.nome)techs.push(D.t1.nome);if(D.t2.nome)techs.push(D.t2.nome);
  var rows=[
    ["Razza", r?r.name:"—"],
    ["Punti Vita", r?(r.pv+" · Vita "+r.hp):"—"],
    ["Attributi", attrStr],
    ["Ruolo", roleStr],
    ["Skill", (roleSkill()?roleSkill()+" d8 · ":"")+skillStr],
    ["Tecniche", techs.join(", ")||"—"],
    ["Frutto", D.frutto.has?((D.frutto.nome||"(senza nome)")+(D.frutto.tipo?(" · "+D.frutto.tipo):"")):"Nessuno"]
  ];
  var g=el("div",{class:"sumgrid"});
  rows.forEach(function(rw){g.appendChild(el("div",{class:"sumrow",html:'<span class="k">'+rw[0]+'</span><span class="v">'+esc(rw[1])+'</span>'}));});
  p.appendChild(g);

  var save=el("button",{class:"btn gold big",style:"margin-top:22px;width:100%;",text:"⚓ Salva nella tua lista"});
  save.onclick=saveToList;
  p.appendChild(save);
}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

function saveToList(){
  if(!D.nome||!D.nome.trim()){alert("Dai un nome al tuo pirata prima di salvare.");goto(0);return;}
  if(!D.race){alert("Scegli una razza prima di salvare.");goto(1);return;}
  var ct=readCT();var id=newId();ct.chars[id]=D;ct.order.push(id);ct.activeId=id;writeCT(ct);
  showDone(id);
}
function showDone(id){
  $("#stepper").style.display="none";$("#nav").style.display="none";
  var p=$("#panel");p.className="panel done-card";p.innerHTML="";
  p.appendChild(el("div",{class:"seal",text:"⚓"}));
  p.appendChild(el("h2",{text:"«"+(D.nome||"Pirata")+"» è nella tua lista!"}));
  p.appendChild(el("div",{style:"color:var(--ink-soft);margin-top:4px;",text:"Salvato nel cloud. Lo ritrovi nel tuo profilo e puoi continuare a svilupparlo nella gestione."}));
  var acts=el("div",{class:"done-actions"});
  acts.appendChild(el("a",{class:"btn gold",href:"/gestisci-pirata/?c="+encodeURIComponent(id),text:"Gestisci questo pirata"}));
  acts.appendChild(el("a",{class:"btn ghost",href:"/profilo/",text:"Vai al mio profilo"}));
  p.appendChild(acts);
  window.scrollTo({top:0,behavior:"smooth"});
}

$("#prev").onclick=function(){goto(step-1);};
$("#next").onclick=function(){goto(step+1);};
buildStepper();goto(0);
})();
</script>
</body>
