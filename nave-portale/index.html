<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grand Line Chronicles — Portale della Nave</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Pirata+One&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
:root{--ink:#2b1d12;--ink-soft:#5a4633;--red:#8c1c13;--red-br:#b71c1c;--gold:#b8860b;--gold-2:#c8a24b;--paper:#f3e3c3;--paper-2:#ecd9b2;--line:#cdb487;--sea:#2f5b7a;--shadow:rgba(60,40,15,.35);--ok:#3f6b3f;--warn:#9c7a12;--bad:#8c1c13;}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{font-family:'EB Garamond',Georgia,serif;color:var(--ink);font-size:17px;line-height:1.5;background-color:#e7d2a6;background-image:radial-gradient(ellipse at 20% 0%,#f6e8c9 0,rgba(246,232,201,0) 55%),radial-gradient(ellipse at 100% 100%,#e3cb9c 0,rgba(227,203,156,0) 60%),radial-gradient(circle at 50% 40%,#f1e0bd 0,#e2c896 100%);min-height:100vh;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.wrap{max-width:1080px;margin:0 auto;padding:18px 16px 80px;}
header.top{text-align:center;position:relative;padding:6px 0 2px;}
header.top .wheel{font-size:34px;color:var(--red);line-height:1;}
header.top h1{font-family:'Pirata One',cursive;font-size:clamp(30px,6vw,52px);color:var(--red);margin:0;text-shadow:1px 1px 0 rgba(0,0,0,.12);}
header.top .sub{font-family:'Cinzel',serif;font-weight:700;letter-spacing:.24em;text-transform:uppercase;font-size:11px;color:var(--ink-soft);margin-top:2px;}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0 4px;}
.btn{font-family:'Cinzel',serif;font-weight:700;font-size:12px;letter-spacing:.04em;border:1px solid var(--red);background:var(--red);color:#fff;padding:8px 13px;border-radius:2px;cursor:pointer;transition:.15s;}
.btn:hover{background:var(--red-br);}.btn:focus-visible{outline:3px solid var(--gold-2);outline-offset:2px;}
.btn.gold{border-color:var(--gold);background:var(--gold);}.btn.gold:hover{background:var(--gold-2);}
.btn.ghost{background:transparent;color:var(--red);}.btn.ghost:hover{background:rgba(140,28,19,.08);}
.btn.sm{font-size:11px;padding:5px 9px;}
.saved{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;color:var(--ink-soft);align-self:center;}
/* tabs */
.tabs{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:12px 0 16px;border-bottom:2px solid var(--gold);padding-bottom:0;}
.tab{font-family:'Cinzel',serif;font-weight:700;font-size:12.5px;letter-spacing:.05em;text-transform:uppercase;border:1px solid var(--line);border-bottom:none;background:rgba(255,255,255,.35);color:var(--ink-soft);padding:9px 14px;border-radius:4px 4px 0 0;cursor:pointer;margin-bottom:-2px;}
.tab[aria-selected="true"]{background:linear-gradient(var(--paper),var(--paper-2));color:var(--red);border-color:var(--gold);border-bottom:2px solid var(--paper-2);}
.tab:focus-visible{outline:2px solid var(--gold-2);}
section.panel{display:none;}
section.panel.active{display:block;animation:fade .2s ease;}
@keyframes fade{from{opacity:.4}to{opacity:1}}
@media(prefers-reduced-motion:reduce){section.panel.active{animation:none}}
/* cards */
.card{background:linear-gradient(var(--paper),var(--paper-2));border:2px solid #6b4f2a;box-shadow:inset 0 0 0 1px var(--gold-2),0 6px 16px var(--shadow);border-radius:3px;padding:14px 16px;margin-bottom:16px;}
.card h2{font-family:'Cinzel',serif;font-size:15px;letter-spacing:.08em;text-transform:uppercase;color:var(--red);margin:0 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px;display:flex;align-items:center;gap:7px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr;}}
label.fld{display:block;}
label.fld .lab{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:2px;display:block;}
input.txt,select.txt,textarea.txt{width:100%;font-family:'EB Garamond',serif;font-size:16px;color:var(--ink);background:rgba(255,255,255,.65);border:1px solid var(--line);border-radius:2px;padding:7px 9px;}
input.txt:focus,select.txt:focus,textarea.txt:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 2px rgba(140,28,19,.15);background:#fff;}
textarea.txt{resize:vertical;min-height:60px;line-height:1.45;}
/* stat dice steppers */
.stat{display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(255,255,255,.4);border:1px solid var(--line);border-radius:3px;padding:9px 11px;}
.stat .info{flex:1;}
.stat .name{font-family:'Cinzel',serif;font-weight:700;font-size:13px;color:var(--red);text-transform:uppercase;letter-spacing:.05em;}
.stat .desc{font-size:12.5px;color:var(--ink-soft);}
.stepper{display:flex;align-items:center;gap:6px;}
.stepper button{width:26px;height:26px;border:1px solid var(--gold);background:rgba(255,255,255,.6);color:var(--red);font-weight:700;border-radius:50%;cursor:pointer;font-size:15px;line-height:1;}
.stepper button:hover{background:var(--gold-2);color:#fff;}
.die{font-family:'Cinzel',serif;font-weight:900;font-size:17px;color:#fff;background:radial-gradient(circle at 35% 30%,#a83227,#6e1410);min-width:42px;text-align:center;padding:5px 4px;border-radius:5px;border:1px solid var(--gold-2);box-shadow:0 2px 4px var(--shadow);}
.derived{font-family:'Cinzel',serif;font-size:11px;color:var(--ink-soft);margin-top:3px;}
.derived b{color:var(--red);}
/* PS gauge */
.gauge{margin-top:4px;}
.gauge .track{height:22px;background:#d8c49a;border:1px solid #6b4f2a;border-radius:11px;overflow:hidden;position:relative;}
.gauge .fill{height:100%;transition:width .25s,background .25s;border-radius:11px 0 0 11px;}
.gauge .pslabel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;font-size:12px;color:#2b1d12;text-shadow:0 1px 0 rgba(255,255,255,.4);}
.cond{display:inline-block;font-family:'Cinzel',serif;font-weight:700;font-size:12px;letter-spacing:.08em;padding:3px 10px;border-radius:11px;color:#fff;margin-top:6px;}
.psctrl{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
.psctrl input{width:64px;}
/* result box */
.result{margin-top:10px;background:#fff8ea;border:1px dashed var(--gold);border-radius:3px;padding:8px 11px;min-height:20px;font-size:14.5px;}
.result .roll{margin:3px 0;}
.result .roll .tot{font-family:'Cinzel',serif;font-weight:900;color:var(--red);}
.tag{display:inline-block;font-family:'Cinzel',serif;font-weight:700;font-size:11px;padding:1px 7px;border-radius:9px;color:#fff;}
.man-btns{display:flex;flex-wrap:wrap;gap:8px;}
.man-btns .btn{flex:0 0 auto;}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.muted{color:var(--ink-soft);font-size:13px;}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:rgba(255,255,255,.5);border-radius:14px;padding:4px 10px;font-size:13px;cursor:pointer;}
.chip.broken{background:#fbe3e0;border-color:var(--red);color:var(--red);text-decoration:line-through;}
.mod{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;border:1px solid var(--line);background:rgba(255,255,255,.45);border-radius:3px;padding:8px 11px;margin-bottom:7px;}
.mod .mname{font-family:'Cinzel',serif;font-weight:700;color:var(--red);font-size:13px;}
.mod .meff{font-size:13px;color:var(--ink);}
.mod .x{border:none;background:none;color:var(--red);cursor:pointer;font-size:15px;}
.slotbar{font-family:'Cinzel',serif;font-size:13px;color:var(--ink-soft);margin-bottom:8px;}
.slotbar b{color:var(--red);font-size:16px;}
.crewrow{display:grid;grid-template-columns:1.1fr 1.4fr 0.9fr;gap:8px;align-items:center;margin-bottom:7px;}
@media(max-width:640px){.crewrow{grid-template-columns:1fr;}}
.crewrow .ruolo{font-family:'Cinzel',serif;font-weight:700;font-size:12.5px;color:var(--red);}
.crewrow .att{font-size:11px;color:var(--ink-soft);}
.note-foot{text-align:center;font-family:'Cinzel',serif;font-size:12px;color:var(--ink-soft);letter-spacing:.06em;margin-top:8px;}
.help{font-size:13.5px;color:var(--ink-soft);background:#fff8ea;border-left:4px solid var(--gold);border-radius:2px;padding:8px 11px;margin-bottom:12px;}
@media print{.toolbar,.tabs,.man-btns,.psctrl,.stepper button,.btn{display:none!important;}section.panel{display:block!important;}body{background:#fff;}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="wheel">☸</div>
    <h1>Portale della Nave</h1>
    <div class="sub">Grand Line Chronicles · plancia di comando</div>
  </header>
  <div class="toolbar">
    <button class="btn gold sm" id="presetBtn">⚓ Nave di partenza</button>
    <button class="btn sm" onclick="window.print()">🖨 Stampa</button>
    <button class="btn ghost sm" id="exportBtn">⬇ Esporta</button>
    <button class="btn ghost sm" id="importBtn">⬆ Importa</button>
    <button class="btn ghost sm" id="resetBtn">↺ Azzera</button>
    <span class="saved" id="saved">salvato</span>
    <input type="file" id="importFile" accept="application/json" style="display:none;" />
  </div>
  <div class="tabs" role="tablist" id="tabs"></div>

  <section class="panel" data-tab="Plancia" id="p-plancia"></section>
  <section class="panel" data-tab="Equipaggio" id="p-equipaggio"></section>
  <section class="panel" data-tab="Battaglia" id="p-battaglia"></section>
  <section class="panel" data-tab="Navigazione" id="p-navigazione"></section>
  <section class="panel" data-tab="Cantiere" id="p-cantiere"></section>
  <section class="panel" data-tab="Diario" id="p-diario"></section>

  <div class="note-foot">La nave non è solo un mezzo: è casa, fortezza e compagna di viaggio. ⚓</div>
</div>

<script>
"use strict";
const KEY="glc_nave_v1";
const DICE_SHIP=["d4","d6","d8","d10","d12"];
const DICE_ATTR=["—","d4","d6","d8","d10","d12","d20"];
const PS_BY_DIE={d4:20,d6:30,d8:40,d10:50,d12:60};
const SLOT_BY_DIE={d4:1,d6:2,d8:3,d10:5,d12:7};
const STATIONS=[
 {key:"capitano",ruolo:"Capitano",att:"Spirito",use:"bonus a un alleato"},
 {key:"timoniere",ruolo:"Timoniere",att:"Astuzia",use:"Vele · Navigazione"},
 {key:"cannoniere",ruolo:"Cannoniere",att:"Tecnica",use:"Artiglieria"},
 {key:"vedetta",ruolo:"Vedetta",att:"Astuzia",use:"anti-sorpresa"},
 {key:"ingegnere",ruolo:"Ingegnere",att:"Astuzia",use:"Riparazioni"},
 {key:"combattente",ruolo:"Combattente di bordo",att:"Forza/Tecnica",use:"abbordaggio"},
];
const CATALOG=[
 {nome:"Cannoni gemelli",slot:1,eff:"Una cannonata extra per scena."},
 {nome:"Sperone d'acciaio",slot:1,eff:"Speronamento: +1 gradino di danno."},
 {nome:"Batteria pesante",slot:2,eff:"Cannonate: +1 gradino di danno, 1 volta per scena."},
 {nome:"Arpioni d'abbordaggio",slot:1,eff:"+1 dado in abbordaggio; trattieni la nave nemica."},
 {nome:"Compartimenti stagni",slot:1,eff:"La nave resiste oltre lo 0: affonda solo a −10 PS."},
 {nome:"Scafo corazzato",slot:2,eff:"Riduci di 2 i danni subiti dalle cannonate."},
 {nome:"Rete antiabbordaggio",slot:1,eff:"I nemici hanno +2 soglia per abbordarti."},
 {nome:"Chiglia veloce",slot:1,eff:"Le evasioni nemiche hanno +1 soglia; +iniziativa."},
 {nome:"Coup de Burst (vele a scoppio)",slot:2,eff:"1×/scena: un balzo o una fuga automatica."},
 {nome:"Timone gemello",slot:1,eff:"Manovra Evasiva: +1 dado."},
 {nome:"Stiva ampliata",slot:1,eff:"+cargo e provviste trasportabili."},
 {nome:"Officina di bordo",slot:2,eff:"Riparazioni: −25% ore e +1 dado."},
 {nome:"Polena vivente",slot:1,eff:"1×/avventura la nave resiste a un colpo fatale (resta a 1 PS)."},
 {nome:"Cabina del navigatore",slot:1,eff:"+1 dado ai tiri di Navigazione."},
];
const MATERIALS=[
 {id:"legname",nome:"Legname comune",rar:"Comune",soglia:4,costo:500,note:"Tavole e travi da carpenteria"},
 {id:"corda",nome:"Corda e tela",rar:"Comune",soglia:4,costo:400,note:"Per vele, sartie e legature"},
 {id:"catrame",nome:"Catrame e pece",rar:"Comune",soglia:4,costo:300,note:"Sigilla e impermeabilizza"},
 {id:"ferramenta",nome:"Ferramenta",rar:"Comune",soglia:4,costo:600,note:"Chiodi, staffe, cardini"},
 {id:"stagionato",nome:"Legno stagionato",rar:"Non comune",soglia:8,costo:2000,note:"Per alberi, timoni e strutture portanti"},
 {id:"tela_r",nome:"Tela rinforzata",rar:"Non comune",soglia:8,costo:1500,note:"Vele di qualità"},
 {id:"meccanica",nome:"Componenti meccanici",rar:"Non comune",soglia:8,costo:2500,note:"Ingranaggi, perni, carrucole di precisione"},
 {id:"metallo",nome:"Metallo navale",rar:"Raro",soglia:12,costo:6000,note:"Bronzo e acciaio per cannoni e rinforzi"},
 {id:"quercia",nome:"Quercia del Grand Line",rar:"Raro",soglia:12,costo:8000,note:"Legno pregiato da scafo"},
 {id:"adam",nome:"Adam Wood",rar:"Leggendario",soglia:18,costo:0,note:"Solo narrativo: il legno delle navi leggendarie"},
];
const MAT_NAME=Object.fromEntries(MATERIALS.map(m=>[m.id,m.nome]));
function matStr(req){return req.map(([id,q])=>q+"\u00d7 "+MAT_NAME[id]).join(", ");}
const UPG_MATS={
 scafo:{d6:[["legname",3],["catrame",1]],d8:[["stagionato",2],["catrame",1]],d10:[["quercia",2],["catrame",2]],d12:[["adam",1],["quercia",2]]},
 vele:{d6:[["corda",3]],d8:[["tela_r",2],["corda",1]],d10:[["tela_r",3],["stagionato",1]],d12:[["adam",1],["tela_r",3]]},
 artiglieria:{d6:[["ferramenta",2],["legname",1]],d8:[["metallo",1],["meccanica",1]],d10:[["metallo",2],["meccanica",2]],d12:[["adam",1],["metallo",3]]},
 struttura:{d6:[["legname",2],["ferramenta",1]],d8:[["stagionato",2],["ferramenta",2]],d10:[["quercia",1],["stagionato",2],["meccanica",1]],d12:[["adam",1],["quercia",2],["meccanica",2]]},
};
const REPAIRS=[
 {t:"Condizione: Danneggiata",ore:16,s:8,mat:[["legname",2],["catrame",1]],ok:"Rimuovi la condizione (+4: +10 PS).",ko:"Peggiora a Grave, −5 PS."},
 {t:"Condizione: Grave",ore:32,s:10,mat:[["legname",3],["stagionato",1],["catrame",2]],ok:"Torna a Danneggiata (+4: +8 PS).",ko:"Torna Critica + un modulo a caso si rompe."},
 {t:"Condizione: Critica",ore:48,s:12,mat:[["stagionato",3],["ferramenta",2],["catrame",2]],ok:"Torna a Grave.",ko:"Perdi altri 1d6 PS + evento del Capitano."},
 {t:"Scafo: danno lieve (1–10 PS)",ore:8,s:7,mat:[["legname",1],["catrame",1]],ok:"Recuperi i PS persi (+4: +2).",ko:"Nessun recupero."},
 {t:"Modulo: Albero maestro",ore:24,s:10,mat:[["stagionato",2],["corda",2]],ok:"Ripristinato: Vele a dado pieno.",ko:"Crollo: −2 dadi Vele fino al porto."},
 {t:"Modulo: Timone",ore:16,s:9,mat:[["stagionato",1],["meccanica",1]],ok:"Ripristinato: manovre normali.",ko:"Si rompe: deriva, niente evasiva."},
 {t:"Modulo: Batteria cannoni",ore:20,s:10,mat:[["metallo",1],["meccanica",1]],ok:"Ripristinata: Artiglieria a dado pieno.",ko:"Esplosione: 1d6 PS alla nave."},
 {t:"Modulo: Stiva",ore:12,s:8,mat:[["legname",2],["ferramenta",1]],ok:"Ripristinata: nessuna perdita cargo.",ko:"Stiva inutilizzabile, cargo perso."},
 {t:"Modulo: Sala macchine/remi",ore:20,s:9,mat:[["meccanica",2],["metallo",1]],ok:"Ripristinata: movimento normale.",ko:"Deriva totale fino al porto."},
 {t:"Modulo: Scafo sotto la linea",ore:32,s:12,mat:[["quercia",2],["catrame",2]],ok:"Ripristinato: PS massimi a pieno.",ko:"Falla grave: −15 PS max."},
];
const DESTRUCT=[
 {key:"albero",nome:"Albero maestro",eff:"Vele −1 dado; velocità dimezzata."},
 {key:"timone",nome:"Timone",eff:"Niente Manovra Evasiva."},
 {key:"batteria",nome:"Batteria cannoni",eff:"Artiglieria −1 dado."},
 {key:"stiva",nome:"Stiva",eff:"Cargo danneggiato o perso."},
 {key:"macchine",nome:"Sala macchine",eff:"Impossibile muoversi attivamente."},
 {key:"scafo",nome:"Scafo sotto la linea",eff:"−10 PS massimi permanenti."},
];
const PNG_DIM={
 "Scheletro (3–5)":{dado:"d4",tiri:"1 tiro/turno",costo:"5.000 Berry/mese"},
 "Ridotto (6–10)":{dado:"d6",tiri:"1 tiro/turno",costo:"15.000 Berry/mese"},
 "Completo (11–20)":{dado:"d6",tiri:"2 tiri/turno",costo:"35.000 Berry/mese"},
 "Esperto (21+)":{dado:"d8",tiri:"2 tiri/turno",costo:"80.000 Berry/mese"},
};

function blank(){return{nome:"",tipo:"",polena:"",legno:"",
 stats:{scafo:"d6",vele:"d6",artiglieria:"d6",struttura:"d6"},
 psCur:30,psMaxMod:0,
 crew:{capitano:{nome:"",attr:"—"},timoniere:{nome:"",attr:"—"},cannoniere:{nome:"",attr:"—"},vedetta:{nome:"",attr:"—"},ingegnere:{nome:"",attr:"—"},combattente:{nome:"",attr:"—"}},
 carpenteria:"d6",
 moduli:[],
 distrutti:{albero:false,timone:false,batteria:false,stiva:false,macchine:false,scafo:false},
 png:{dim:"Ridotto (6–10)",lealta:5},
 magazzino:{},
 berry:0,cargo:"",note:"",log:[]};}
let S=blank();
const $=s=>document.querySelector(s);
function el(t,p,k){const e=document.createElement(t);if(p)for(const x in p){if(x==="class")e.className=p[x];else if(x==="html")e.innerHTML=p[x];else if(x==="text")e.textContent=p[x];else if(x.slice(0,2)==="on")e[x.toLowerCase()]=p[x];else e.setAttribute(x,p[x]);}if(k!=null)(Array.isArray(k)?k:[k]).forEach(c=>{if(c==null)return;e.appendChild(typeof c==="string"?document.createTextNode(c):c);});return e;}
let saveT;function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}const sv=$("#saved");if(sv){sv.textContent="salvato ✓";clearTimeout(saveT);saveT=setTimeout(()=>sv.textContent="salvato",1200);}}
function load(){try{const s=localStorage.getItem(KEY);if(s)S=Object.assign(blank(),JSON.parse(s));}catch(e){}}

function psMax(){return Math.max(1,(PS_BY_DIE[S.stats.scafo]||30)+(S.psMaxMod||0));}
function slotsTot(){return SLOT_BY_DIE[S.stats.struttura]||2;}
function slotsUsed(){return S.moduli.reduce((a,m)=>a+(m.slot||1),0);}
function condition(){const pct=S.psCur/psMax()*100;if(S.psCur<=0)return["AFFONDATA","#3a3a3a"];if(pct>75)return["INTEGRA","#3f6b3f"];if(pct>50)return["DANNEGGIATA","#9c7a12"];if(pct>25)return["GRAVE","#c2691b"];return["CRITICA","#8c1c13"];}
function esitoMargine(m){if(m>=4)return["Successo pieno","#9c7a12"];if(m>=1)return["Successo","#3f6b3f"];if(m===0)return["Stentato","#8a6a1e"];if(m>=-3)return["Fallimento parziale","#c2691b"];return["Fallimento grave","#8c1c13"];}

/* ---------- TABS ---------- */
const TABS=["Plancia","Equipaggio","Battaglia","Navigazione","Cantiere","Diario"];
function buildTabs(){const t=$("#tabs");TABS.forEach((name,i)=>{const b=el("button",{class:"tab",role:"tab","aria-selected":i===0?"true":"false",text:name,onClick:()=>selectTab(name)});t.appendChild(b);});}
function selectTab(name){[...$("#tabs").children].forEach(b=>b.setAttribute("aria-selected",b.textContent===name?"true":"false"));document.querySelectorAll("section.panel").forEach(p=>p.classList.toggle("active",p.dataset.tab===name));window.scrollTo({top:0,behavior:"smooth"});}

/* ---------- helpers ---------- */
function field(lab,key,obj,type){const inp=el(type==="area"?"textarea":"input",{class:"txt",value:obj[key]||""});if(type&&type!=="area")inp.type=type;inp.oninput=()=>{obj[key]=type==="number"?(parseInt(inp.value)||0):inp.value;save();};return el("label",{class:"fld"},[el("span",{class:"lab",text:lab}),inp]);}

 const mag=el("div",{class:"card"});mag.appendChild(el("h2",{html:"🧺 Magazzino materiali"}));
 mag.appendChild(el("div",{class:"help",text:"Segna qui i materiali in stiva. In porto si comprano in Berry; in giro si trovano col Reperimento (tiro vs soglia di rarità). Sopra, ogni lavoro mostra ✓ se hai tutto."}));
 MATERIALS.forEach(m=>{
   const qty=el("span",{class:"die",text:String(S.magazzino[m.id]||0),style:"background:radial-gradient(circle at 35% 30%,#c8a24b,#8a6a1e)"});
   const step=d=>{S.magazzino[m.id]=Math.max(0,(S.magazzino[m.id]||0)+d);qty.textContent=S.magazzino[m.id];save();};
   mag.appendChild(el("div",{class:"stat"},[
     el("div",{class:"info"},[el("div",{class:"name",text:m.nome}),el("div",{class:"desc",html:m.rar+" (reperimento soglia "+m.soglia+") · "+(m.costo?("in porto ~"+m.costo.toLocaleString("it-IT")+" ฿/unità"):"non in vendita — narrativo")+" · "+m.note})]),
     el("div",{class:"stepper"},[el("button",{text:"−","aria-label":"meno",onClick:()=>step(-1)}),qty,el("button",{text:"+","aria-label":"più",onClick:()=>step(1)})])
   ]));
 });
 p.appendChild(mag);
}

/* ---------- DIARIO ---------- */
function renderDiario(){const p=$("#p-diario");p.innerHTML="";
 const c=el("div",{class:"card"});c.appendChild(el("h2",{html:"📒 Diario di bordo"}));
 c.appendChild(el("div",{class:"grid2"},[field("Tesoro (Berry)","berry",S,"number"),field("Cargo / provviste","cargo",S)]));
 const note=el("textarea",{class:"txt",placeholder:"Note di bordo, rotta, obiettivi, debiti, alleati…"});note.value=S.note;note.style.minHeight="160px";note.oninput=()=>{S.note=note.value;save();};
 c.appendChild(el("label",{class:"fld",style:"margin-top:10px"},[el("span",{class:"lab",text:"Note"}),note]));
 p.appendChild(c);
}

/* ---------- toolbar ---------- */
function renderAll(){renderPlancia();renderEquipaggio();renderBattaglia();renderNavigazione();renderCantiere();renderDiario();}
$("#presetBtn").onclick=()=>{if(!confirm("Imposta una nave di partenza tipica? (una statistica a d8 a scelta, le altre a d6). Sovrascrive le statistiche attuali."))return;S.stats={scafo:"d8",vele:"d6",artiglieria:"d6",struttura:"d6"};S.psCur=psMax();save();renderAll();selectTab("Plancia");};
$("#exportBtn").onclick=()=>{const b=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=(S.nome||"nave")+".json";a.click();URL.revokeObjectURL(a.href);};
$("#importBtn").onclick=()=>$("#importFile").click();
$("#importFile").onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{S=Object.assign(blank(),JSON.parse(rd.result));save();renderAll();}catch(err){alert("File non valido.");}};rd.readAsText(f);};
$("#resetBtn").onclick=()=>{if(confirm("Azzerare tutta la scheda della nave?")){S=blank();save();renderAll();selectTab("Plancia");}};

load();buildTabs();renderAll();selectTab("Plancia");
</script>
