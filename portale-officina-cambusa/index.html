<style>
:root{
  --abyss:#0a1920; --vellum:#ecdcb6; --ink:#34271a; --ink-soft:#5e4c34;
  --gold:#c9a24a; --gold-bright:#ecca77; --seal:#9a241a; --foam:#a8c6bd; --line:#cdb487;
}
*{box-sizing:border-box;}
body{margin:0; min-height:100vh; color:var(--vellum); font-family:'Cormorant Garamond',Georgia,serif; font-size:19px; line-height:1.5; background:radial-gradient(120% 80% at 50% -10%, #15333f 0%, #0a1920 55%, #060f14 100%) fixed;}
a{color:inherit;}
.topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px clamp(16px,4vw,40px); border-bottom:1px solid rgba(201,162,74,.22);}
.brand{display:flex; align-items:center; gap:9px; text-decoration:none;}
.brand .anc{color:var(--gold); font-size:20px;}
.brand .nm{font-family:'Marcellus SC',serif; letter-spacing:.16em; text-transform:uppercase; font-size:12px; color:var(--foam);}
.wrap{max-width:1000px; margin:0 auto; padding:clamp(20px,5vw,42px) clamp(16px,4vw,40px) 64px;}
.back{display:inline-flex; align-items:center; gap:7px; text-decoration:none; color:var(--foam); font-family:'Marcellus SC',serif; letter-spacing:.1em; font-size:13px; text-transform:uppercase; margin-bottom:14px;}
.back:hover{color:var(--gold-bright);}
.hero{text-align:center; margin-bottom:18px;}
.hero .kick{font-family:'Marcellus SC',serif; letter-spacing:.28em; text-transform:uppercase; font-size:12px; color:var(--gold);}
.hero h1{font-family:'Cinzel Decorative',serif; font-weight:900; font-size:clamp(26px,5.4vw,46px); color:var(--vellum); margin:.12em 0 0;}
.adminflag{display:inline-block; margin-top:8px; font-family:'Marcellus SC',serif; letter-spacing:.08em; font-size:12px; text-transform:uppercase; padding:4px 12px; border-radius:999px; border:1px solid var(--gold); color:var(--gold-bright);}

.tabs{display:flex; gap:8px; justify-content:center; margin:18px 0 22px; flex-wrap:wrap;}
.tab{font-family:'Marcellus SC',serif; letter-spacing:.08em; text-transform:uppercase; font-size:13px; padding:9px 18px; border-radius:999px; border:1px solid rgba(201,162,74,.4); background:transparent; color:var(--vellum); cursor:pointer;}
.tab[aria-selected="true"]{background:linear-gradient(180deg,#e7be63,#c9a24a); color:#2b1f0d; border-color:var(--gold);}
.panel{display:none;} .panel.active{display:block;}

.sec-head{display:flex; align-items:center; justify-content:space-between; gap:12px; margin:8px 2px 14px; flex-wrap:wrap;}
.sec-head h2{font-family:'Cinzel Decorative',serif; font-weight:700; font-size:clamp(18px,3.6vw,24px); color:var(--vellum); margin:0;}
.hint{color:var(--foam); font-size:15px; margin:0 2px 16px;}

.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px;}
.item{background:linear-gradient(180deg,#f4e8c8,#ecdcb6); color:var(--ink); border:1px solid var(--line); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 12px 28px rgba(0,0,0,.3);}
.item .pic{height:140px; background:#e6d4a6 center/cover no-repeat; display:grid; place-items:center; color:#b69a5c; font-size:40px; border-bottom:1px solid var(--line);}
.item .ib{padding:12px 13px 14px; display:flex; flex-direction:column; gap:6px; flex:1;}
.item .inm{font-family:'Cinzel Decorative',serif; font-weight:700; font-size:17px; color:#4a371d;}
.item .idesc{color:var(--ink-soft); font-size:15px; flex:1; white-space:pre-wrap;}
.item .iacts{display:flex; gap:7px; flex-wrap:wrap; margin-top:6px;}
.ibtn{font-family:'Marcellus SC',serif; font-size:12px; letter-spacing:.04em; border-radius:8px; padding:6px 11px; cursor:pointer; border:1px solid var(--gold); background:linear-gradient(180deg,#e7be63,#c9a24a); color:#2b1f0d;}
.ibtn.ghost{background:transparent; color:#5a3f1c;}
.ibtn.del{background:transparent; border-color:#c98; color:#9a241a;}
.ibtn.del:hover{background:#9a241a; color:#fff;}
.empty-note{color:var(--foam); font-style:italic; border:1px dashed rgba(201,162,74,.4); border-radius:12px; padding:14px; grid-column:1/-1;}

.formcard{background:linear-gradient(180deg,#f4e8c8,#ecdcb6); color:var(--ink); border:1px solid var(--line); border-radius:14px; padding:16px; margin:14px 0 26px; box-shadow:0 12px 28px rgba(0,0,0,.3);}
.formcard h3{font-family:'Cinzel Decorative',serif; font-weight:700; font-size:17px; color:#5a3f1c; margin:0 0 12px;}
.lab{font-family:'Marcellus SC',serif; letter-spacing:.08em; text-transform:uppercase; font-size:11px; color:var(--ink-soft); display:block; margin:0 0 5px;}
input.txt,textarea.txt{width:100%; font-family:'Cormorant Garamond',serif; font-size:17px; color:var(--ink); background:#fffdf6; border:1px solid var(--line); border-radius:10px; padding:9px 11px; outline:none; margin-bottom:10px;}
textarea.txt{min-height:64px; resize:vertical;}
input.txt:focus,textarea.txt:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,162,74,.18);}
.imgrow{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
.imgprev{width:64px; height:64px; border-radius:10px; background:#e6d4a6 center/cover no-repeat; border:1px solid var(--line); display:grid; place-items:center; color:#b69a5c; font-size:22px; flex:0 0 64px;}
.btn{font-family:'Marcellus SC',serif; letter-spacing:.06em; border-radius:10px; padding:10px 16px; border:1px solid var(--gold); background:linear-gradient(180deg,#e7be63,#c9a24a); color:#2b1f0d; cursor:pointer; font-size:14px;}
.btn.ghost{background:transparent; color:#5a3f1c;}
.btn:hover{filter:brightness(1.05);}
.note{color:var(--ink-soft); font-size:14px;}
.soon{text-align:center; color:var(--foam); padding:40px 10px;}
.soon .big{font-size:46px;}

/* modale aggiungi al diario */
.ov{position:fixed; inset:0; background:rgba(6,15,20,.72); display:none; align-items:center; justify-content:center; padding:20px; z-index:50;}
.ov.show{display:flex;}
.modal{background:linear-gradient(180deg,#f4e8c8,#ecdcb6); color:var(--ink); border:1px solid var(--gold); border-radius:16px; padding:20px; max-width:440px; width:100%; box-shadow:0 24px 60px rgba(0,0,0,.5);}
.modal h3{font-family:'Cinzel Decorative',serif; color:#5a3f1c; margin:0 0 6px;}
.modal .sub{color:var(--ink-soft); font-size:15px; margin:0 0 14px;}
select.txt{width:100%; font-family:'Cormorant Garamond',serif; font-size:17px; color:var(--ink); background:#fffdf6; border:1px solid var(--line); border-radius:10px; padding:9px 11px; margin-bottom:14px;}
.modal .row{display:flex; gap:9px; justify-content:flex-end;}

.ingpick{display:grid; gap:8px; margin-bottom:12px;}
.ingopt{display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:10px; background:#fffdf6; border:1px solid var(--line); border-radius:10px; padding:9px 12px; cursor:pointer;}
.ingopt input{width:18px;height:18px;}
.ingopt .io-nm{font-weight:700;color:#4a371d;}
.ingopt .io-bn{color:var(--ink-soft);font-size:15px;}
.ingopt .io-rare{font-family:'Marcellus SC',serif;font-size:11px;letter-spacing:.04em;color:#9a7e4c;text-transform:uppercase;white-space:nowrap;}
@media(max-width:560px){.ingopt{grid-template-columns:auto 1fr;}.ingopt .io-rare{grid-column:2;}}
.subh{font-family:'Cinzel Decorative',serif; color:var(--vellum); font-size:16px; margin:16px 2px 8px;}
.reftbl{display:grid; gap:6px;}
.refrow{display:grid; grid-template-columns:1.1fr 1.4fr 1.3fr; gap:10px; background:linear-gradient(180deg,#f4e8c8,#ecdcb6); color:var(--ink); border:1px solid var(--line); border-radius:10px; padding:9px 12px;}
.refrow .rf-nm{font-weight:700;color:#4a371d;}
.refrow .rf-bd{color:var(--ink-soft);font-size:14px;}
.refrow .rf-bn{color:#5a3f1c;font-size:15px;}
@media(max-width:600px){.refrow{grid-template-columns:1fr;}}
</style>
</head>

var SKEY="glc_sessioni_v1";
function readST(){var o=null;try{o=JSON.parse(localStorage.getItem(SKEY)||"null");}catch(e){}
  if(o&&o.sessions&&typeof o.sessions==="object"){o.order=Array.isArray(o.order)?o.order.filter(function(id){return o.sessions[id];}):[];for(var id in o.sessions){if(o.order.indexOf(id)<0)o.order.push(id);}return o;}
  return {v:1,activeId:"",order:[],sessions:{}};}

/* ---- immagine: ridimensiona a ~256px jpeg base64 ---- */
function resizeImg(file,cb){if(!file||!file.type||file.type.indexOf("image/")!==0){cb("");return;}
  var rd=new FileReader();rd.onload=function(){var img=new Image();img.onload=function(){
    var max=256,w=img.width,h=img.height,sc=Math.min(1,max/Math.max(w,h));
    var cw=Math.round(w*sc),ch=Math.round(h*sc);var cv=document.createElement("canvas");cv.width=cw;cv.height=ch;
    cv.getContext("2d").drawImage(img,0,0,cw,ch);var out="";try{out=cv.toDataURL("image/jpeg",0.82);}catch(e){out=rd.result;}cb(out);
  };img.src=rd.result;};rd.readAsDataURL(file);}

/* ---- catalogo condiviso (Supabase) ---- */
async function fetchCatalog(tipo){
  if(!sb) return {error:"Client Supabase non pronto.",rows:[]};
  try{
    var res=await sb.from("catalogo").select("*").eq("tipo",tipo).order("updated_at",{ascending:false});
    if(res.error) return {error:res.error.message,rows:[]};
    return {error:null,rows:res.data||[]};
  }catch(e){return {error:String(e),rows:[]};}
}

var pendingEntry=null;
function openDiaryPicker(titolo,desc,kind){
  var st=readST(), sel=$("#ov-sel"); sel.innerHTML="";
  if(!st.order.length){
    $("#ov-sub").innerHTML="Non hai ancora sessioni. Creane una dal <a href='/profilo/' style='color:#7a4;font-weight:700'>profilo</a>, poi torna qui.";
    sel.style.display="none"; $("#ov-ok").style.display="none";
  }else{
    $("#ov-sub").textContent="Scegli la sessione in cui inserire «"+titolo+"».";
    sel.style.display=""; $("#ov-ok").style.display="";
    st.order.forEach(function(id){ sel.appendChild(el("option",{value:id,text:sessName(st.sessions[id])})); });
  }
  pendingEntry={titolo:titolo,desc:desc,kind:kind||"oggetto"};
  $("#ov").classList.add("show");
}
function closePicker(){ $("#ov").classList.remove("show"); pendingEntry=null; }
function confirmAddToDiary(){
  if(!pendingEntry) return closePicker();
  var id=$("#ov-sel").value; if(!id) return closePicker();
  var st=readST(); var s=st.sessions[id]; if(!s) return closePicker();
  if(!Array.isArray(s.diary)) s.diary=[];
  s.diary.push({id:newId("d_"),kind:(pendingEntry.kind||"oggetto"),titolo:pendingEntry.titolo,desc:pendingEntry.desc,ts:Date.now()});
  st.activeId=id; writeST(st);
  closePicker();

}

function renderMine(grid){
  grid.innerHTML="";
  var o=readOI();
  if(!o.items.length){ grid.appendChild(el("div",{class:"empty-note",text:"Non hai ancora oggetti tuoi."})); return; }
  o.items.forEach(function(it){
    grid.appendChild(itemCard(it,{mine:true,onDelete:function(x){ if(!confirm("Eliminare «"+(x.nome||"")+"» dai tuoi oggetti?"))return; var oo=readOI(); oo.items=oo.items.filter(function(y){return y.id!==x.id;}); writeOI(oo); renderMine(grid); }}));
  });
}

async function loadCatalog(){
  var grid=$("#catgrid"); if(!grid) return;
  var r=await fetchCatalog("oggetto");
  grid.innerHTML="";
  if(r.error){
    grid.appendChild(el("div",{class:"empty-note",html:"Catalogo non disponibile. Se sei l'admin, verifica il setup SQL della tabella <b>catalogo</b> su Supabase.<br><span class='note'>Dettaglio: "+esc(r.error)+"</span>"}));
    return;
  }
  if(!r.rows.length){ grid.appendChild(el("div",{class:"empty-note",text:isAdmin?"Catalogo vuoto. Aggiungi il primo oggetto qui sotto.":"Il Capitano non ha ancora pubblicato oggetti."})); return; }
  r.rows.forEach(function(o){
    grid.appendChild(itemCard(o,{admin:isAdmin,
      onEdit:function(x){ window.__startEdit&&window.__startEdit(x); },
      onDelete:async function(x){ if(!confirm("Eliminare «"+(x.nome||"")+"» dal catalogo ufficiale? Lo perderanno tutti i giocatori."))return; var res=await deleteOfficial(x.id); if(res.error){alert("Errore: "+res.error.message);return;} flash("Eliminato ✓"); loadCatalog(); }
    }));
  });
}

/* ---- importa catalogo dal manuale (solo admin) ---- */
async function seedCatalog(){
  if(!isAdmin||!sb) return;
  if(!confirm("Importare/aggiornare i "+SEED_OGGETTI.length+" oggetti del manuale nel catalogo ufficiale?\n\nGli oggetti con lo stesso nome vengono aggiornati, non duplicati.")) return;
  var btn=$("#seedBtn"); if(btn){btn.disabled=true; btn.textContent="Importazione\u2026";}
  var rows=SEED_OGGETTI.map(function(o){ return {id:o.id,tipo:"oggetto",nome:o.nome,descrizione:o.descrizione,dati:o.dati,img:o.img||"",updated_at:new Date().toISOString()}; });
  var ok=0, err=null;
  for(var i=0;i<rows.length;i+=50){
    var chunk=rows.slice(i,i+50);
    var res=await sb.from("catalogo").upsert(chunk,{onConflict:"id"});
    if(res.error){ err=res.error.message; break; } else { ok+=chunk.length; }
  }
  if(btn){btn.disabled=false; btn.textContent="Importa catalogo dal manuale ("+SEED_OGGETTI.length+")";}
  if(err){ alert("Errore durante l'importazione ("+ok+" salvati prima dell'errore): "+err+"\n\nVerifica il setup SQL e di essere loggato come admin."); }
  else { flash(ok+" oggetti importati \u2713"); }
  loadCatalog();
}

function writeMP(o){try{localStorage.setItem(CKEY,JSON.stringify(o));}catch(e){}}
async function seedDishes(){
  if(!isAdmin||!sb) return;
  if(!confirm("Importare/aggiornare i "+SEED_PIATTI.length+" piatti del manuale nel catalogo ufficiale?")) return;
  var btn=document.getElementById("seedDishBtn"); if(btn){btn.disabled=true;btn.textContent="Importazione\u2026";}
  var rows=SEED_PIATTI.map(function(o){return {id:o.id,tipo:"piatto",nome:o.nome,descrizione:o.descrizione,dati:o.dati,img:o.img||"",updated_at:new Date().toISOString()};});
  var ok=0,err=null;
  for(var i=0;i<rows.length;i+=50){var res=await sb.from("catalogo").upsert(rows.slice(i,i+50),{onConflict:"id"});if(res.error){err=res.error.message;break;}ok+=Math.min(50,rows.length-i);}

/* ---- tabs ---- */
function selectTab(name){
  [].forEach.call(document.querySelectorAll("#tabs .tab"),function(b){ b.setAttribute("aria-selected", b.dataset.tab===name?"true":"false"); });
  document.querySelectorAll("section.panel").forEach(function(p){ p.classList.toggle("active", p.dataset.tab===name); });
  if(name==="cambusa" && !window.__cambusaRendered){ window.__cambusaRendered=true; renderCambusa(); }
}

/* ---- init ---- */
async function init(){
  sb=window.__glcSB||sb;
  try{
    if(sb){ var u=await sb.auth.getUser(); var em=(u&&u.data&&u.data.user&&u.data.user.email)||""; myEmail=em; isAdmin=ADMIN_EMAILS.indexOf((em||"").toLowerCase())>=0; }
  }catch(e){}
  $("#adminflag").innerHTML = isAdmin ? '<span class="adminflag">⚓ Modalità Capitano (admin)</span>' : "";
  renderOfficina();
}

document.addEventListener("DOMContentLoaded",function(){
  [].forEach.call(document.querySelectorAll("#tabs .tab"),function(b){ b.onclick=function(){ selectTab(b.dataset.tab); }; });
  $("#ov-cancel").onclick=closePicker;
  $("#ov-ok").onclick=confirmAddToDiary;
  $("#ov").addEventListener("click",function(e){ if(e.target===$("#ov")) closePicker(); });
  setTimeout(init,350);
});
