<style>
:root{
  --abyss:#0a1920; --abyss-2:#0e2530; --vellum:#ecdcb6; --vellum-2:#e3d0a4;
  --ink:#34271a; --ink-soft:#5e4c34; --gold:#c9a24a; --gold-bright:#ecca77;
  --seal:#9a241a; --foam:#a8c6bd; --line:#cdb487;
}
*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh; color:var(--vellum);
  font-family:'Cormorant Garamond',Georgia,serif; font-size:19px; line-height:1.5;
  background:radial-gradient(120% 80% at 50% -10%, #15333f 0%, #0a1920 55%, #060f14 100%) fixed;
}
a{color:inherit;}
.topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px clamp(16px,4vw,40px); border-bottom:1px solid rgba(201,162,74,.22);}
.brand{display:flex; align-items:center; gap:9px; text-decoration:none;}
.brand .anc{color:var(--gold); font-size:20px;}
.brand .nm{font-family:'Marcellus SC',serif; letter-spacing:.16em; text-transform:uppercase; font-size:12px; color:var(--foam);}
.wrap{max-width:980px; margin:0 auto; padding:clamp(20px,5vw,42px) clamp(16px,4vw,40px) 64px;}
.back{display:inline-flex; align-items:center; gap:7px; text-decoration:none; color:var(--foam); font-family:'Marcellus SC',serif; letter-spacing:.1em; font-size:13px; text-transform:uppercase; margin-bottom:14px;}
.back:hover{color:var(--gold-bright);}
.hero{text-align:center; margin-bottom:26px;}
.hero .kick{font-family:'Marcellus SC',serif; letter-spacing:.28em; text-transform:uppercase; font-size:12px; color:var(--gold);}
.hero h1{font-family:'Cinzel Decorative',serif; font-weight:900; font-size:clamp(26px,5.4vw,46px); color:var(--vellum); margin:.12em 0 0; text-shadow:0 2px 18px rgba(0,0,0,.4);}
.hero .editname{display:inline-flex; align-items:center; gap:10px; cursor:text;}
.hero .pencil{color:var(--gold); font-size:18px; opacity:.85;}
.hero input.nameinp{font-family:'Cinzel Decorative',serif; font-weight:900; font-size:clamp(24px,5vw,42px); color:var(--vellum); background:transparent; border:none; border-bottom:2px solid var(--gold); text-align:center; outline:none; max-width:90vw;}

.cols{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px;}
@media(max-width:680px){.cols{grid-template-columns:1fr;}}
.card{background:linear-gradient(180deg,#f4e8c8,#ecdcb6); color:var(--ink); border:1px solid var(--line); border-radius:16px; padding:18px 18px 20px; box-shadow:0 14px 34px rgba(0,0,0,.34);}
.card h2{font-family:'Cinzel Decorative',serif; font-weight:700; font-size:19px; color:#5a3f1c; margin:0 0 12px; display:flex; align-items:center; gap:9px;}
.lab{font-family:'Marcellus SC',serif; letter-spacing:.08em; text-transform:uppercase; font-size:11px; color:var(--ink-soft); display:block; margin-bottom:5px;}
select.txt,input.txt,textarea.txt{width:100%; font-family:'Cormorant Garamond',serif; font-size:17px; color:var(--ink); background:#fffdf6; border:1px solid var(--line); border-radius:10px; padding:9px 11px; outline:none;}
select.txt:focus,input.txt:focus,textarea.txt:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,162,74,.18);}
textarea.txt{min-height:74px; resize:vertical;}
.linked{margin-top:12px; display:flex; align-items:center; gap:12px; background:#fffdf6; border:1px dashed var(--line); border-radius:12px; padding:11px 12px;}
.linked .av{width:46px; height:46px; border-radius:50%; flex:0 0 46px; display:grid; place-items:center; background:radial-gradient(circle at 35% 30%,#d8b65f,#9c7a22); color:#3a2c12; font-size:20px; overflow:hidden;}
.linked .av img{width:100%; height:100%; object-fit:cover;}
.linked .nm{font-weight:700; color:#4a371d; font-size:18px;}
.linked .sb{color:var(--ink-soft); font-size:14px;}
.muted{color:var(--ink-soft);}

.diary h2{margin-bottom:6px;}
.diary .help{background:#fff7e3; border:1px solid #e6cf94; border-radius:12px; padding:10px 12px; color:#6a5024; font-size:15px; margin:8px 0 16px;}
.entry{display:flex; gap:12px; align-items:flex-start; padding:13px 0; border-top:1px solid rgba(120,90,40,.22);}
.entry:first-of-type{border-top:none;}
.badge{flex:0 0 auto; width:34px; height:34px; border-radius:9px; display:grid; place-items:center; font-size:17px; background:#efe0bb; border:1px solid var(--line);}
.badge.oggetto{background:#dfeaf0;}
.badge.piatto{background:#f3e2d6;}
.entry .body{flex:1; min-width:0;}
.entry .et{font-weight:700; color:#4a371d; font-size:18px;}
.entry .ed{color:var(--ink-soft); white-space:pre-wrap; margin-top:2px;}
.entry .ets{font-family:'Marcellus SC',serif; font-size:11px; letter-spacing:.06em; color:#9a7e4c; margin-top:5px; text-transform:uppercase;}
.entry .del{flex:0 0 auto; background:transparent; border:1px solid #c98; color:#9a241a; border-radius:8px; padding:4px 9px; cursor:pointer; font-family:'Marcellus SC',serif; font-size:12px;}
.entry .del:hover{background:#9a241a; color:#fff;}
.addrow{margin-top:16px; display:grid; gap:9px;}
.btn{font-family:'Marcellus SC',serif; letter-spacing:.06em; border-radius:10px; padding:10px 16px; border:1px solid var(--gold); background:linear-gradient(180deg,#e7be63,#c9a24a); color:#2b1f0d; cursor:pointer; font-size:14px;}
.btn:hover{filter:brightness(1.05);}
.btn.ghost{background:transparent; color:#5a3f1c;}
.empty{color:var(--ink-soft); font-style:italic; padding:8px 0;}
.notfound{background:linear-gradient(180deg,#f4e8c8,#ecdcb6); color:var(--ink); border:1px solid var(--line); border-radius:16px; padding:26px; text-align:center;}
.notfound a{color:#7a4; font-weight:700;}

.notebook .help{background:#fff7e3; border:1px solid #e6cf94; border-radius:12px; padding:10px 12px; color:#6a5024; font-size:15px; margin:8px 0 14px;}
.nbpage{width:100%; min-height:360px; resize:vertical; border:1px solid var(--line); border-radius:12px; padding:16px 18px 18px; color:#3a2c18; font-family:'Cormorant Garamond',Georgia,serif; font-size:19px; line-height:32px; outline:none; background-color:#fbf3da; background-image:repeating-linear-gradient(#fbf3da 0px,#fbf3da 31px,#d9c79a 31px,#d9c79a 32px); background-attachment:local;}
.nbpage:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,162,74,.18);}
.nbnav{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:12px;}
.nbind{font-family:'Marcellus SC',serif; font-size:13px; letter-spacing:.06em; color:var(--ink-soft); text-transform:uppercase;}
.nbtools{display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap;}
.nbbtn{font-family:'Marcellus SC',serif; font-size:13px; letter-spacing:.05em; border-radius:9px; padding:8px 14px; cursor:pointer; border:1px solid var(--gold); background:linear-gradient(180deg,#e7be63,#c9a24a); color:#2b1f0d;}
.nbbtn:disabled{opacity:.4; cursor:default;}
.nbbtn.add{background:transparent; color:#5a3f1c;}
.nbbtn.del{background:transparent; border-color:#c98; color:#9a241a;}
.nbbtn.del:hover{background:#9a241a; color:#fff;}
.nbsaved{font-family:'Marcellus SC',serif; font-size:12px; color:#3f6b3f; opacity:0; transition:opacity .3s; margin-left:auto;}
</style>
</head>
<body>
<div class="topbar">
  <a class="brand" href="/"><span class="anc">⚓</span><span class="nm">Grand Line Chronicles</span></a>
  <span id="glc-login-slot"></span>
</div>

<div class="wrap">
  <a class="back" href="/profilo/">‹ Le mie sessioni</a>
  <div id="app"></div>
</div>

<script>
function el(t,a,kids){var e=document.createElement(t);a=a||{};for(var k in a){if(k==="text")e.textContent=a[k];else if(k==="html")e.innerHTML=a[k];else if(k==="onClick")e.onclick=a[k];else if(k==="onInput")e.oninput=a[k];else if(k==="onChange")e.onchange=a[k];else e.setAttribute(k,a[k]);}(kids||[]).forEach(function(c){if(c)e.appendChild(c);});return e;}
function $(s){return document.querySelector(s);}
function qp(k){return new URLSearchParams(location.search).get(k);}
function esc(s){return (s||"").replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

/* ---------- container SESSIONI ---------- */
var SKEY="glc_sessioni_v1";
function newSId(){return "s_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function readST(){
  var o=null; try{o=JSON.parse(localStorage.getItem(SKEY)||"null");}catch(e){}
  if(o && o.sessions && typeof o.sessions==="object"){
    o.order=Array.isArray(o.order)?o.order.filter(function(id){return o.sessions[id];}):[];
    for(var id in o.sessions){ if(o.order.indexOf(id)<0) o.order.push(id); }
    if(!o.sessions[o.activeId]) o.activeId=o.order[0]||"";
    return o;
  }
  return {v:1,activeId:"",order:[],sessions:{}};
}
function writeST(st){ try{localStorage.setItem(SKEY,JSON.stringify(st));}catch(e){} }

/* ---------- container PERSONAGGI (lettura) ---------- */
var CKEY="glc_pirata_v4";
function readCT(){
  var o=null; try{o=JSON.parse(localStorage.getItem(CKEY)||"null");}catch(e){}
  if(o && o.chars && typeof o.chars==="object"){
    o.order=Array.isArray(o.order)?o.order.filter(function(id){return o.chars[id];}):[];
    for(var id in o.chars){ if(o.order.indexOf(id)<0) o.order.push(id); }
    return o;
  }
  if(o){ return {v:2,activeId:"x",order:["x"],chars:{x:o}}; }
  return {v:2,activeId:"",order:[],chars:{}};
}
function charName(c){return (c&&c.nome&&c.nome.trim())?c.nome.trim():"Senza nome";}
function charSub(c){var b=[];if(c){if(c.role)b.push(c.role);var n=Number(c.bounty||0);if(n>0)b.push(n.toLocaleString("it-IT")+" ฿");}return b.join("  ·  ");}

/* ---------- container NAVI (lettura) ---------- */
var NKEY="glc_nave_v1";
function readNT(){
  var o=null; try{o=JSON.parse(localStorage.getItem(NKEY)||"null");}catch(e){}
  if(o && o.ships && typeof o.ships==="object"){
    o.order=Array.isArray(o.order)?o.order.filter(function(id){return o.ships[id];}):[];
    for(var id in o.ships){ if(o.order.indexOf(id)<0) o.order.push(id); }
    return o;
  }
  if(o){ return {v:1,activeId:"x",order:["x"],ships:{x:o}}; }
  return {v:1,activeId:"",order:[],ships:{}};
}
function shipName(s){return (s&&s.nome&&s.nome.trim())?s.nome.trim():"Nave senza nome";}
function shipSub(s){var b=[];if(s){if(s.tipo)b.push(s.tipo);if(s.legno)b.push(s.legno);}return b.join("  ·  ");}

/* ---------- stato ---------- */
var SID=qp("s")||"";
function S(){var st=readST();return st.sessions[SID];}
function save(){var st=readST();if(st.sessions[SID]){ /* l'oggetto è già nel container via setters */ } st.activeId=SID; writeST(st);}

/* setter helper: aggiorna un campo della sessione e salva */
function setField(key,val){var st=readST();if(!st.sessions[SID])return;st.sessions[SID][key]=val;st.activeId=SID;writeST(st);}

/* ---------- render ---------- */
var NB_PAGE=0, nbTimer=null;
function flushPage(val){var st=readST();var ss=st.sessions[SID];if(!ss)return;if(!Array.isArray(ss.pages))ss.pages=[];if(!ss.pages[NB_PAGE])ss.pages[NB_PAGE]={id:newSId(),t:"",ts:Date.now()};ss.pages[NB_PAGE].t=val;st.activeId=SID;writeST(st);}
function buildNotebook(s){
  if(!Array.isArray(s.pages)||!s.pages.length){s.pages=[{id:newSId(),t:"",ts:Date.now()}];var st0=readST();if(st0.sessions[SID]){st0.sessions[SID].pages=s.pages;writeST(st0);}}
  if(NB_PAGE>=s.pages.length)NB_PAGE=s.pages.length-1; if(NB_PAGE<0)NB_PAGE=0;
  var total=s.pages.length, page=s.pages[NB_PAGE];
  var card=el("div",{class:"card notebook"});
  card.appendChild(el("h2",{html:"\ud83d\udcd6 Diario di bordo"}));
  card.appendChild(el("div",{class:"help",text:"Il tuo quaderno: scrivi a piacere, pagina dopo pagina. Si salva da solo."}));
  var ta=el("textarea",{class:"nbpage",placeholder:""});
  ta.value=page.t||"";
  ta.oninput=function(){
    if(nbTimer)clearTimeout(nbTimer); var val=ta.value;
    nbTimer=setTimeout(function(){
      var st=readST();var ss=st.sessions[SID];if(!ss)return;if(!Array.isArray(ss.pages))ss.pages=[];
      if(!ss.pages[NB_PAGE])ss.pages[NB_PAGE]={id:newSId(),t:"",ts:Date.now()};
      ss.pages[NB_PAGE].t=val; ss.pages[NB_PAGE].ts=Date.now(); st.activeId=SID; writeST(st);
      var fl=$("#nb-saved"); if(fl){fl.style.opacity="1"; setTimeout(function(){fl.style.opacity="0";},900);}
    },550);
  };
  card.appendChild(ta);
  var prev=el("button",{class:"nbbtn",text:"\u2039 Precedente",onClick:function(){flushPage(ta.value);if(NB_PAGE>0){NB_PAGE--;render();}}});
  var next=el("button",{class:"nbbtn",text:"Successiva \u203a",onClick:function(){flushPage(ta.value);if(NB_PAGE<total-1){NB_PAGE++;render();}}});
  if(NB_PAGE===0)prev.disabled=true; if(NB_PAGE===total-1)next.disabled=true;
  card.appendChild(el("div",{class:"nbnav"},[prev,el("span",{class:"nbind",text:"Pagina "+(NB_PAGE+1)+" di "+total}),next]));
  var addB=el("button",{class:"nbbtn add",text:"+ Nuova pagina",onClick:function(){flushPage(ta.value);var st=readST();var ss=st.sessions[SID];if(!ss)return;if(!Array.isArray(ss.pages))ss.pages=[];ss.pages.push({id:newSId(),t:"",ts:Date.now()});st.activeId=SID;writeST(st);NB_PAGE=ss.pages.length-1;render();}});
  var delB=el("button",{class:"nbbtn del",text:"Elimina pagina",onClick:function(){if(!confirm("Eliminare questa pagina del diario?"))return;var st=readST();var ss=st.sessions[SID];if(!ss)return;ss.pages.splice(NB_PAGE,1);if(!ss.pages.length)ss.pages.push({id:newSId(),t:"",ts:Date.now()});if(NB_PAGE>=ss.pages.length)NB_PAGE=ss.pages.length-1;st.activeId=SID;writeST(st);render();}});
  card.appendChild(el("div",{class:"nbtools"},[addB,delB,el("span",{id:"nb-saved",class:"nbsaved",text:"salvato \u2713"})]));
  return card;
}
function render(){
  var app=$("#app"); app.innerHTML="";
  var st=readST();
  var s=st.sessions[SID];
  if(!s){
    app.appendChild(el("div",{class:"notfound",html:"Questa sessione non esiste (o è stata eliminata).<br><br><a href='/profilo/'>↩ Torna al profilo</a> per aprirne o crearne una."}));
    return;
  }
  if(!Array.isArray(s.diary)) s.diary=[];

  /* hero: nome editabile */
  var hero=el("div",{class:"hero"});
  hero.appendChild(el("div",{class:"kick",text:"Diario di bordo"}));
  var h1=el("h1");
  var nameSpan=el("span",{class:"editname",title:"Tocca per rinominare"},[
    el("span",{text:(s.nome&&s.nome.trim())?s.nome:"Sessione senza nome"}),
    el("span",{class:"pencil",text:"✎"})
  ]);
  nameSpan.onclick=function(){
    h1.innerHTML="";
    var inp=el("input",{class:"nameinp",value:s.nome||""});
    inp.placeholder="Nome della sessione";
    h1.appendChild(inp); inp.focus(); inp.select();
    function done(){ setField("nome",inp.value.trim()); render(); }
    inp.onblur=done; inp.onkeydown=function(e){ if(e.key==="Enter"){e.preventDefault();inp.blur();} };
  };
  h1.appendChild(nameSpan);
  hero.appendChild(h1);
  app.appendChild(hero);

  /* colonne: personaggio + nave */
  var cols=el("div",{class:"cols"});

  /* --- Personaggio --- */
  var ct=readCT();
  var cCard=el("div",{class:"card"});
  cCard.appendChild(el("h2",{html:"🧑‍✈️ Personaggio"}));
  var cSel=el("select",{class:"txt"});
  cSel.appendChild(el("option",{value:"",text:ct.order.length?"— scegli un personaggio —":"— nessun personaggio creato —"}));
  ct.order.forEach(function(id){ cSel.appendChild(el("option",{value:id,text:charName(ct.chars[id])})); });
  cSel.value = (s.persId && ct.chars[s.persId]) ? s.persId : "";
  cSel.onchange=function(){ setField("persId",cSel.value); render(); };
  cCard.appendChild(el("label",{class:"lab",text:"Collega un personaggio esistente"}));
  cCard.appendChild(cSel);
  if(s.persId && ct.chars[s.persId]){
    var c=ct.chars[s.persId];
    var av=el("div",{class:"av"});
    if(c.photo){ av.appendChild(el("img",{src:c.photo,alt:""})); } else { av.textContent="⚓"; }
    cCard.appendChild(el("div",{class:"linked"},[av,el("div",{},[el("div",{class:"nm",text:charName(c)}),el("div",{class:"sb",text:charSub(c)||"Scheda da completare"})])]));
  } else if(!ct.order.length){
    cCard.appendChild(el("div",{class:"linked muted",html:"Crea prima un personaggio dal <a href='/crea-il-tuo-pirata/' style='color:#7a4;font-weight:700'>profilo</a>."}));
  }
  cols.appendChild(cCard);

  /* --- Nave --- */
  var nt=readNT();
  var nCard=el("div",{class:"card"});
  nCard.appendChild(el("h2",{html:"⛵ Nave"}));
  var nSel=el("select",{class:"txt"});
  nSel.appendChild(el("option",{value:"",text:nt.order.length?"— scegli una nave —":"— nessuna nave creata —"}));
  nt.order.forEach(function(id){ nSel.appendChild(el("option",{value:id,text:shipName(nt.ships[id])})); });
  nSel.value = (s.shipId && nt.ships[s.shipId]) ? s.shipId : "";
  nSel.onchange=function(){ setField("shipId",nSel.value); render(); };
  nCard.appendChild(el("label",{class:"lab",text:"Collega una nave esistente"}));
  nCard.appendChild(nSel);
  if(s.shipId && nt.ships[s.shipId]){
    var sh=nt.ships[s.shipId];
    nCard.appendChild(el("div",{class:"linked"},[el("div",{class:"av",text:"⛵"}),el("div",{},[el("div",{class:"nm",text:shipName(sh)}),el("div",{class:"sb",text:shipSub(sh)||"Nave da completare"})])]));
  } else if(!nt.order.length){
    nCard.appendChild(el("div",{class:"linked muted",html:"Crea prima una nave dal <a href='/profilo/' style='color:#7a4;font-weight:700'>profilo</a>."}));
  }
  cols.appendChild(nCard);

  app.appendChild(cols);

  /* --- Diario di bordo (quaderno) --- */
  app.appendChild(buildNotebook(s));

  /* --- Mappa delle isole --- */
  if(!Array.isArray(s.map)) s.map=[];
  var mapCard=el("div",{class:"card"});
  mapCard.appendChild(el("h2",{html:"\ud83d\uddfa\ufe0f Mappa delle isole"}));
  mapCard.appendChild(el("div",{class:"help",text:"Segna le isole che la ciurma scopre: scegli un tipo, premi \u00ab+ Aggiungi isola\u00bb e tocca la mappa. Dai nome e note; trascina un segnaposto per spostarlo."}));
  var mapBox=el("div");
  mapCard.appendChild(mapBox);
  app.appendChild(mapCard);
  if(window.GLCMap){ GLCMap.mount(mapBox,{islands:s.map,readOnly:false,onChange:function(islands){ var st2=readST(); var ss=st2.sessions[SID]; if(!ss)return; ss.map=islands; st2.activeId=SID; writeST(st2); }}); }

  /* --- Diario --- */
  var dCard=el("div",{class:"card diary"});
  dCard.appendChild(el("h2",{html:"📜 Registro della sessione"}));
  dCard.appendChild(el("div",{class:"help",text:"Note rapide e gli oggetti/piatti inseriti da Officina e Cambusa. Per scrivere a lungo usa il Diario di bordo qui sopra."}));

  if(s.diary.length===0){
    dCard.appendChild(el("div",{class:"empty",text:"Ancora nessuna voce. Scrivi la prima nota qui sotto."}));
  } else {
    s.diary.slice().reverse().forEach(function(en){
      var icon = en.kind==="oggetto"?"⚙":(en.kind==="piatto"?"🍲":"📝");
      var when = en.ts? new Date(en.ts).toLocaleString("it-IT",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "";
      var del=el("button",{class:"del",text:"Elimina",onClick:function(){
        if(!confirm("Eliminare questa voce dal diario?"))return;
        var st2=readST(); var ss=st2.sessions[SID]; if(!ss)return;
        ss.diary=(ss.diary||[]).filter(function(x){return x.id!==en.id;}); writeST(st2); render();
      }});
      dCard.appendChild(el("div",{class:"entry"},[
        el("div",{class:"badge "+(en.kind||"nota"),text:icon}),
        el("div",{class:"body"},[
          el("div",{class:"et",text:en.titolo||"(senza titolo)"}),
          en.desc?el("div",{class:"ed",text:en.desc}):null,
          when?el("div",{class:"ets",text:when}):null
        ]),
        del
      ]));
    });
  }

  /* form aggiungi nota */
  var tIn=el("input",{class:"txt",placeholder:"Titolo della voce (es. «Sbarco a Isola Gelida»)"});
  var dIn=el("textarea",{class:"txt",placeholder:"Cosa è successo…"});
  var addBtn=el("button",{class:"btn",text:"+ Aggiungi nota",onClick:function(){
    var t=tIn.value.trim(), d=dIn.value.trim();
    if(!t && !d){ tIn.focus(); return; }
    var st2=readST(); var ss=st2.sessions[SID]; if(!ss)return;
    if(!Array.isArray(ss.diary)) ss.diary=[];
    ss.diary.push({id:newSId(),kind:"nota",titolo:t||"Nota",desc:d,ts:Date.now()});
    st2.activeId=SID; writeST(st2); render();
  }});
  dCard.appendChild(el("div",{class:"addrow"},[
    el("label",{class:"lab",text:"Nuova nota rapida"}),
    tIn, dIn, el("div",{},[addBtn])
  ]));

  app.appendChild(dCard);
}

window.addEventListener("DOMContentLoaded",render);
window.addEventListener("focus",function(){ /* aggiorna pickers se hai creato pers/navi in un'altra scheda */ if(S())render(); });
</script>
</body>
</html>
